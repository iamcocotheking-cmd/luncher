name: Build DURBIN Launcher

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle 8.11.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1

      - name: Locate launcher source
        shell: bash
        run: |
          if [ -f "PojavLauncher-3_openjdk/build.gradle" ]; then
            echo "PROJECT_DIR=PojavLauncher-3_openjdk" >> "$GITHUB_ENV"
          elif [ -f "build.gradle" ]; then
            echo "PROJECT_DIR=." >> "$GITHUB_ENV"
          else
            echo "ERROR: Could not find launcher Gradle source"
            find . -maxdepth 3 -name build.gradle -print
            exit 1
          fi

      - name: Patch missing v18 UI functions
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          p = Path("PojavLauncher-3_openjdk/app_pojavlauncher/src/main/java/net/kdt/pojavlaunch/kotlin/ui/screens/MainMenuScreen.kt")
          if not p.exists():
              p = Path("app_pojavlauncher/src/main/java/net/kdt/pojavlaunch/kotlin/ui/screens/MainMenuScreen.kt")

          s = p.read_text(encoding="utf-8")

          needed_imports = [
              "import androidx.compose.ui.graphics.vector.ImageVector",
              "import net.kdt.pojavlaunch.durbin.firebase.DurbinFirebaseConfig",
              "import com.google.firebase.database.DataSnapshot",
              "import com.google.firebase.database.DatabaseError",
              "import com.google.firebase.database.FirebaseDatabase",
              "import com.google.firebase.database.ValueEventListener",
          ]

          lines = s.splitlines()
          import_positions = [i for i, line in enumerate(lines) if line.startswith("import ")]
          insert_at = import_positions[-1] + 1 if import_positions else 1
          for imp in needed_imports:
              if imp not in s:
                  lines.insert(insert_at, imp)
                  insert_at += 1
          s = "\n".join(lines) + "\n"

          inline_news = r'''
          @Composable
          private fun DurbinInlineNewsPanel() {
              val context = LocalContext.current
              var title by remember { mutableStateOf("DURBIN News") }
              var body by remember { mutableStateOf("Loading latest launcher news...") }
              var tag by remember { mutableStateOf("News") }

              LaunchedEffect(Unit) {
                  try {
            val ready = DurbinFirebaseConfig.ensureInitialized(context)
            if (!ready) {
                title = "DURBIN News"
                body = "Firebase is not ready yet. Rebuild with the included google-services.json."
                tag = "Offline"
            } else {
                FirebaseDatabase.getInstance(context.getString(R.string.durbin_firebase_database_url).trim())
                    .getReference("durbin/news")
                    .addListenerForSingleValueEvent(object : ValueEventListener {
                        override fun onDataChange(snapshot: DataSnapshot) {
                            val latest = snapshot.children.maxByOrNull {
                                it.child("timestamp").getValue(Long::class.java) ?: 0L
                            }
                            if (latest == null) {
                                title = "DURBIN News"
                                body = "No news added yet. Add your first news in Firebase."
                                tag = "Empty"
                            } else {
                                title = latest.child("title").getValue(String::class.java) ?: "DURBIN News"
                                body = latest.child("body").getValue(String::class.java) ?: "No description"
                                tag = latest.child("tag").getValue(String::class.java) ?: "News"
                            }
                        }

                        override fun onCancelled(error: DatabaseError) {
                            title = "DURBIN News"
                            body = error.message
                            tag = "Error"
                        }
                    })
            }
                  } catch (t: Throwable) {
            title = "DURBIN News"
            body = t.message ?: "Could not load news"
            tag = "Offline"
                  }
              }

              Surface(
                  modifier = Modifier
            .fillMaxWidth()
            .height(82.dp),
                  shape = RoundedCornerShape(18.dp),
                  color = Color.Black.copy(alpha = 0.55f),
                  border = BorderStroke(1.dp, Color.White.copy(alpha = 0.18f))
              ) {
                  Row(
            modifier = Modifier.padding(horizontal = 13.dp, vertical = 10.dp),
            verticalAlignment = Alignment.CenterVertically,
            horizontalArrangement = Arrangement.spacedBy(11.dp)
                  ) {
            Box(
                modifier = Modifier
                    .size(46.dp)
                    .clip(RoundedCornerShape(14.dp))
                    .background(MaterialTheme.colorScheme.primary.copy(alpha = 0.20f)),
                contentAlignment = Alignment.Center
            ) {
                Icon(Icons.Rounded.Article, contentDescription = null, tint = MaterialTheme.colorScheme.primary, modifier = Modifier.size(25.dp))
            }
            Column(modifier = Modifier.weight(1f), verticalArrangement = Arrangement.Center) {
                Text(
                    text = tag.uppercase(),
                    color = MaterialTheme.colorScheme.primary,
                    fontSize = 9.sp,
                    fontWeight = FontWeight.Black,
                    maxLines = 1
                )
                Text(
                    text = title,
                    color = Color.White,
                    fontSize = 16.sp,
                    fontWeight = FontWeight.Black,
                    maxLines = 1,
                    overflow = TextOverflow.Ellipsis
                )
                Text(
                    text = body.ifBlank { "No description" },
                    color = Color.White.copy(alpha = 0.76f),
                    fontSize = 11.sp,
                    maxLines = 1,
                    overflow = TextOverflow.Ellipsis
                )
            }
                  }
              }
          }
          '''

          action_card = r'''
          @Composable
          private fun DurbinActionCard(
              modifier: Modifier = Modifier,
              title: String,
              icon: ImageVector,
              subtitle: String,
              onClick: () -> Unit,
              accent: Boolean = false
          ) {
              val borderColor = if (accent) MaterialTheme.colorScheme.primary.copy(alpha = 0.48f) else MaterialTheme.colorScheme.outline.copy(alpha = 0.24f)
              val iconBoxColor = if (accent) MaterialTheme.colorScheme.primary.copy(alpha = 0.24f) else Color.White.copy(alpha = 0.08f)

              OutlinedButton(
                  onClick = onClick,
                  modifier = modifier,
                  shape = RoundedCornerShape(18.dp),
                  border = BorderStroke(1.dp, borderColor),
                  colors = ButtonDefaults.outlinedButtonColors(
            containerColor = Color.Transparent,
            contentColor = Color.White
                  ),
                  contentPadding = PaddingValues(horizontal = 14.dp)
              ) {
                  Row(
            modifier = Modifier.fillMaxSize(),
            verticalAlignment = Alignment.CenterVertically,
            horizontalArrangement = Arrangement.spacedBy(12.dp)
                  ) {
            Box(
                modifier = Modifier
                    .size(42.dp)
                    .clip(RoundedCornerShape(13.dp))
                    .background(iconBoxColor),
                contentAlignment = Alignment.Center
            ) {
                Icon(icon, contentDescription = null, modifier = Modifier.size(23.dp), tint = if (accent) MaterialTheme.colorScheme.primary else Color.White)
            }
            Column(modifier = Modifier.weight(1f), verticalArrangement = Arrangement.Center) {
                Text(title, color = Color.White, fontWeight = FontWeight.ExtraBold, fontSize = 15.sp, maxLines = 1, overflow = TextOverflow.Ellipsis)
                Text(subtitle, color = Color(0xFFBDBDBD), fontSize = 11.sp, maxLines = 1, overflow = TextOverflow.Ellipsis)
            }
            Icon(Icons.AutoMirrored.Filled.ArrowForward, contentDescription = null, modifier = Modifier.size(16.dp), tint = if (accent) MaterialTheme.colorScheme.primary else Color.White.copy(alpha = 0.55f))
                  }
              }
          }
          '''

          extra = ""
          if "private fun DurbinInlineNewsPanel" not in s:
              extra += "\n" + inline_news.strip() + "\n"
          if "private fun DurbinActionCard" not in s:
              extra += "\n" + action_card.strip() + "\n"

          if extra:
              marker = "\n@Composable\nprivate fun DurbinStatusChip"
              if marker in s:
                  s = s.replace(marker, "\n" + extra + marker, 1)
              else:
                  s += "\n" + extra

          p.write_text(s, encoding="utf-8")
          print("Patched:", p)
          print("DurbinInlineNewsPanel exists:", "private fun DurbinInlineNewsPanel" in s)
          print("DurbinActionCard exists:", "private fun DurbinActionCard" in s)
          PY

      - name: Remove Google login and Firebase Auth dependency
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import base64

          root = Path("PojavLauncher-3_openjdk")
          if not root.exists():
              root = Path(".")

          build = root / "app_pojavlauncher" / "build.gradle"
          if build.exists():
              s = build.read_text(encoding="utf-8")
              s = "\n".join(
                  line for line in s.splitlines()
                  if "firebase-auth" not in line
                  and "play-services-auth" not in line
              ) + "\n"
              build.write_text(s, encoding="utf-8")
              print("Removed Firebase Auth and Google Sign-In dependencies")
          else:
              print("WARN: build.gradle not found")

          hub = root / "app_pojavlauncher" / "src" / "main" / "java" / "net" / "kdt" / "pojavlaunch" / "durbin" / "firebase" / "DurbinFirebaseHubActivity.kt"
          hub.parent.mkdir(parents=True, exist_ok=True)
          data = base64.b64decode("").decode("utf-8")
          hub.write_text(data, encoding="utf-8")
          print("Replaced DurbinFirebaseHubActivity.kt with no-login version")
          PY

      - name: Final source sanity check
        shell: bash
        run: |
          echo "Checking for real merge conflict markers only..."
          if grep -RInI -E '^(<<<<<<<|=======|>>>>>>>)( |$)' \
            --exclude-dir=.git \
            --exclude-dir=.gradle \
            --exclude-dir=build \
            --exclude-dir=.cxx \
            --exclude='*.so' \
            --exclude='*.jar' \
            --exclude='*.png' \
            --exclude='*.webp' \
            --exclude='*.jpg' \
            --exclude='*.jpeg' \
            --exclude='*.zip' \
            . ; then
            echo "ERROR: real merge conflict markers found"
            exit 1
          fi

      - name: Verify package and SHA1
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          echo "Package check: net.ashmeet.hyperlauncher"
          grep -n 'applicationId "net.ashmeet.hyperlauncher"' app_pojavlauncher/build.gradle || true
          grep -n '"package_name": "net.ashmeet.hyperlauncher"' app_pojavlauncher/google-services.json || true
          keytool -list -v -keystore app_pojavlauncher/debug.keystore -storepass android | grep -E "SHA1|SHA256" || true

      - name: Build APK
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          gradle :app_pojavlauncher:assembleFullDebug --no-daemon --stacktrace

      - name: Collect APK
        shell: bash
        run: |
          mkdir -p apk-output
          APK_PATH="$(find "$PROJECT_DIR" -type f -name '*.apk' -not -path '*/androidTest/*' -size +10M | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "No APK found"
            find "$PROJECT_DIR" -type f -name '*.apk' -print
            exit 1
          fi
          cp "$APK_PATH" apk-output/DURBIN-Launcher.apk
          ls -lh apk-output/DURBIN-Launcher.apk

      - name: Upload APK
        id: upload_apk_artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: DURBIN-Launcher-APK
          path: apk-output/DURBIN-Launcher.apk
          retention-days: 1

      - name: Upload APK to GitHub Release fallback
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK_PATH="apk-output/DURBIN-Launcher.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "APK not found at $APK_PATH"
            find . -name "*.apk" -type f
            exit 1
          fi
          TAG="durbin-build-${GITHUB_RUN_NUMBER}"
          TITLE="DURBIN Launcher Build ${GITHUB_RUN_NUMBER}"
          gh release create "$TAG" "$APK_PATH" --title "$TITLE" --notes "Auto-built DURBIN Launcher APK." --latest=false || gh release upload "$TAG" "$APK_PATH" --clobber
