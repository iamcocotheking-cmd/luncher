name: Build DURBIN Launcher FINAL

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle 8.11.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1

      - name: Install native build tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake
          echo "CMake:"
          cmake --version || true
          echo "Ninja:"
          ninja --version || true

      - name: Find launcher Gradle project
        shell: bash
        run: |
          echo "Repo root:"
          pwd
          echo "Root files:"
          ls -la

          PROJECT_DIR=""

          if [ -f "gradlew" ] || [ -f "settings.gradle" ] || [ -f "settings.gradle.kts" ]; then
            PROJECT_DIR="."
          elif [ -f "PojavLauncher-3_openjdk/gradlew" ] || [ -f "PojavLauncher-3_openjdk/settings.gradle" ] || [ -f "PojavLauncher-3_openjdk/settings.gradle.kts" ]; then
            PROJECT_DIR="PojavLauncher-3_openjdk"
          elif [ -f "HyperLauncher-3_openjdk/gradlew" ] || [ -f "HyperLauncher-3_openjdk/settings.gradle" ] || [ -f "HyperLauncher-3_openjdk/settings.gradle.kts" ]; then
            PROJECT_DIR="HyperLauncher-3_openjdk"
          else
            FIRST_SETTINGS="$(find . -maxdepth 6 -type f \( -name "settings.gradle" -o -name "settings.gradle.kts" \) | head -n 1 || true)"
            if [ -n "$FIRST_SETTINGS" ]; then
              PROJECT_DIR="$(dirname "$FIRST_SETTINGS")"
            fi
          fi

          if [ -z "$PROJECT_DIR" ]; then
            echo "ERROR: Could not find a Gradle project."
            find . -maxdepth 4 -type d -print
            exit 1
          fi

          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Using project folder: $PROJECT_DIR"

          cd "$PROJECT_DIR"
          ls -la

          if [ -f "gradlew" ]; then
            chmod +x gradlew
            echo "GRADLE_CMD=./gradlew" >> "$GITHUB_ENV"
          else
            echo "GRADLE_CMD=gradle" >> "$GITHUB_ENV"
          fi

      - name: Remove stale Windows native build cache
        shell: bash
        run: |
          cd "$PROJECT_DIR"

          echo "Removing stale native build cache that can contain Windows ninja.exe paths..."
          rm -rf .cxx
          rm -rf app_pojavlauncher/.cxx
          rm -rf dnbglfw/.cxx
          rm -rf forge_installer/.cxx
          rm -rf app_pojavlauncher/build/intermediates/cxx
          rm -rf dnbglfw/build/intermediates/cxx
          rm -rf app_pojavlauncher/build/.cxx
          rm -rf dnbglfw/build/.cxx

          find . -type f \( -name "CMakeCache.txt" -o -name "build_command.txt" \) -delete || true
          find . -type f | grep -i "ninja.exe" || true

      - name: Patch Gradle properties
        shell: bash
        run: |
          cd "$PROJECT_DIR"

          touch gradle.properties

          grep -q '^android.useAndroidX=' gradle.properties \
            && sed -i 's/^android.useAndroidX=.*/android.useAndroidX=true/' gradle.properties \
            || echo 'android.useAndroidX=true' >> gradle.properties

          grep -q '^android.enableJetifier=' gradle.properties \
            && sed -i 's/^android.enableJetifier=.*/android.enableJetifier=true/' gradle.properties \
            || echo 'android.enableJetifier=true' >> gradle.properties

          grep -q '^org.gradle.jvmargs=' gradle.properties \
            || echo 'org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8' >> gradle.properties

          echo "Final gradle.properties:"
          cat gradle.properties

      - name: Patch missing Android resources
        shell: bash
        run: |
          cd "$PROJECT_DIR"

          RES_DIR="app_pojavlauncher/src/main/res"
          mkdir -p "$RES_DIR/values"
          mkdir -p "$RES_DIR/drawable"

          cat > "$RES_DIR/values/durbin_missing_values.xml" <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <dimen name="padding_tiny">4dp</dimen>
              <dimen name="padding_micro">2dp</dimen>
              <dimen name="padding_small">8dp</dimen>
              <dimen name="padding_normal">12dp</dimen>
              <dimen name="padding_large">16dp</dimen>
          </resources>
          EOF

          if [ ! -f "$RES_DIR/drawable/ic_social_media.xml" ]; then
            cat > "$RES_DIR/drawable/ic_social_media.xml" <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp"
              android:height="24dp"
              android:viewportWidth="24"
              android:viewportHeight="24">
              <path
                  android:fillColor="#FFFFFFFF"
                  android:pathData="M18,16.08C17.24,16.08 16.56,16.38 16.04,16.86L8.91,12.71C8.96,12.48 9,12.24 9,12C9,11.76 8.96,11.52 8.91,11.29L15.96,7.18C16.5,7.68 17.21,8 18,8C19.66,8 21,6.66 21,5C21,3.34 19.66,2 18,2C16.34,2 15,3.34 15,5C15,5.24 15.04,5.48 15.09,5.71L8.04,9.82C7.5,9.32 6.79,9 6,9C4.34,9 3,10.34 3,12C3,13.66 4.34,15 6,15C6.79,15 7.5,14.68 8.04,14.18L15.16,18.34C15.11,18.55 15.08,18.77 15.08,19C15.08,20.61 16.39,21.92 18,21.92C19.61,21.92 20.92,20.61 20.92,19C20.92,17.39 19.61,16.08 18,16.08Z"/>
          </vector>
          EOF
          fi

      - name: Patch missing forge_installer Java classes
        shell: bash
        run: |
          cd "$PROJECT_DIR"

          BASE_DIR="forge_installer/src/main/java/git/artdeell/installer_agent"
          mkdir -p "$BASE_DIR"

          printf '%s\n' \
            'package git.artdeell.installer_agent;' \
            '' \
            'import java.awt.*;' \
            '' \
            'public interface ComponentFilter {' \
            '    boolean checkComponent(Component component);' \
            '}' \
            > "$BASE_DIR/ComponentFilter.java"

          printf '%s\n' \
            'package git.artdeell.installer_agent;' \
            '' \
            'import java.util.TimerTask;' \
            '' \
            'public class ComponentTimeoutTask extends TimerTask {' \
            '    @Override' \
            '    public void run() {' \
            '        System.out.println("Initialization timed out!");' \
            '        System.exit(17);' \
            '    }' \
            '}' \
            > "$BASE_DIR/ComponentTimeoutTask.java"

          printf '%s\n' \
            'package git.artdeell.installer_agent;' \
            '' \
            'import javax.swing.*;' \
            'import java.awt.*;' \
            '' \
            'public class DialogFilter implements ComponentFilter {' \
            '    @Override' \
            '    public boolean checkComponent(Component component) {' \
            '        return component instanceof JOptionPane || component instanceof JProgressBar;' \
            '    }' \
            '}' \
            > "$BASE_DIR/DialogFilter.java"

          printf '%s\n' \
            'package git.artdeell.installer_agent;' \
            '' \
            'import javax.swing.*;' \
            'import java.awt.*;' \
            '' \
            'public class MainWindowFilter implements ComponentFilter {' \
            '    @Override' \
            '    public boolean checkComponent(Component component) {' \
            '        return component instanceof JRadioButton || component instanceof JTextField || component instanceof JButton;' \
            '    }' \
            '}' \
            > "$BASE_DIR/MainWindowFilter.java"

      - name: Patch Gradle wrapper to 8.11.1 if wrapper exists
        shell: bash
        run: |
          cd "$PROJECT_DIR"

          if [ -f "gradle/wrapper/gradle-wrapper.properties" ]; then
            sed -i 's#distributionUrl=.*#distributionUrl=https\://services.gradle.org/distributions/gradle-8.11.1-all.zip#g' gradle/wrapper/gradle-wrapper.properties
          fi

      - name: Check Firebase config
        shell: bash
        run: |
          cd "$PROJECT_DIR"

          if [ -f "app_pojavlauncher/google-services.json" ]; then
            echo "Firebase google-services.json found"
          else
            echo "WARNING: app_pojavlauncher/google-services.json not found"
          fi

      - name: Show SHA-1 fingerprint for Firebase
        shell: bash
        run: |
          cd "$PROJECT_DIR"

          $GRADLE_CMD signingReport --no-daemon > "$GITHUB_WORKSPACE/signing-report.txt" || true
          grep "SHA1:" "$GITHUB_WORKSPACE/signing-report.txt" || true

      - name: Upload SHA-1 report
        uses: actions/upload-artifact@v4
        with:
          name: DURBIN-SHA1-signing-report
          path: signing-report.txt
          if-no-files-found: warn
          retention-days: 7

      - name: Build APK without Gradle clean
        shell: bash
        run: |
          cd "$PROJECT_DIR"

          $GRADLE_CMD --version

          # DO NOT run Gradle clean here.
          # This source has stale Windows CMake/ninja paths, and Gradle clean triggers them on Linux.
          $GRADLE_CMD :app_pojavlauncher:assembleFullDebug --no-daemon --stacktrace --rerun-tasks \
          || $GRADLE_CMD :app_pojavlauncher:assembleDebug --no-daemon --stacktrace --rerun-tasks \
          || $GRADLE_CMD assembleDebug --no-daemon --stacktrace --rerun-tasks

      - name: Collect one APK
        shell: bash
        run: |
          mkdir -p apk-output

          echo "APK files found:"
          find "$PROJECT_DIR" -type f -name "*.apk" -not -path "*/androidTest/*" -print -exec ls -lh {} \;

          APK_PATH="$(find "$PROJECT_DIR" -type f -name "*.apk" -not -path "*/androidTest/*" -size +10M | grep -E 'full|universal|debug|release|arm64' | head -n 1 || true)"

          if [ -z "$APK_PATH" ]; then
            APK_PATH="$(find "$PROJECT_DIR" -type f -name "*.apk" -not -path "*/androidTest/*" -size +10M | head -n 1 || true)"
          fi

          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No installable APK found."
            find "$PROJECT_DIR" -type d | grep -E "build|outputs|apk" || true
            exit 1
          fi

          cp "$APK_PATH" apk-output/DURBIN-Launcher.apk
          ls -lh apk-output/DURBIN-Launcher.apk

      - name: Sign APK if unsigned
        shell: bash
        run: |
          APK="apk-output/DURBIN-Launcher.apk"

          if unzip -l "$APK" | grep -E "META-INF/.*(RSA|DSA|EC)" >/dev/null; then
            echo "APK already signed"
            exit 0
          fi

          mkdir -p ~/.android

          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkeypair \
              -keystore ~/.android/debug.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -n 1)"

          "$APKSIGNER" sign \
            --ks ~/.android/debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out apk-output/DURBIN-Launcher-signed.apk \
            "$APK"

          mv apk-output/DURBIN-Launcher-signed.apk "$APK"

      - name: Verify APK
        shell: bash
        run: |
          APK="apk-output/DURBIN-Launcher.apk"
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -n 1)"
          "$APKSIGNER" verify --verbose "$APK" || true
          ls -lh "$APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DURBIN-Launcher-apk
          path: apk-output/DURBIN-Launcher.apk
          if-no-files-found: error
          retention-days: 7
