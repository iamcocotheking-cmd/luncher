name: Build DURBIN Launcher APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - v3_openjdk

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.3"

      - name: Build full debug APK
        run: |
          chmod +x gradlew
          ./gradlew :app_pojavlauncher:assembleFullDebug --no-daemon --stacktrace

      - name: Collect one APK
        run: |
          mkdir -p out
          cp app_pojavlauncher/build/outputs/apk/full/debug/app_pojavlauncher-full-debug.apk out/DURBIN-Launcher-full-debug.apk
          ls -lah out

      - name: Upload DURBIN APK
        uses: actions/upload-artifact@v4
        with:
          name: DURBIN-Launcher-APK
          path: out/DURBIN-Launcher-full-debug.apk
          if-no-files-found: error
          retention-days: 7
