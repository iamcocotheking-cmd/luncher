name: Build DURBIN Launcher

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Find launcher project folder
        shell: bash
        run: |
          echo "Repo root:"
          pwd
          echo "Root files:"
          ls -la

          if [ -f "gradlew" ]; then
            echo "PROJECT_DIR=." >> "$GITHUB_ENV"
            echo "Found Gradle project in repo root"
          elif [ -f "PojavLauncher-3_openjdk/gradlew" ]; then
            echo "PROJECT_DIR=PojavLauncher-3_openjdk" >> "$GITHUB_ENV"
            echo "Found Gradle project in PojavLauncher-3_openjdk"
          elif [ -f "HyperLauncher-3_openjdk/gradlew" ]; then
            echo "PROJECT_DIR=HyperLauncher-3_openjdk" >> "$GITHUB_ENV"
            echo "Found Gradle project in HyperLauncher-3_openjdk"
          else
            echo "ERROR: Could not find gradlew."
            echo "Your repo must contain either:"
            echo "- gradlew in root, or"
            echo "- PojavLauncher-3_openjdk/gradlew"
            echo ""
            echo "Current folders:"
            find . -maxdepth 2 -type f -name "gradlew" -print
            exit 1
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Verify project
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          chmod +x gradlew

          echo "Using project folder:"
          pwd

          echo "Top files:"
          ls -la

          echo "Checking Firebase config..."
          if [ -f "app_pojavlauncher/google-services.json" ]; then
            echo "google-services.json found ✅"
          else
            echo "WARNING: app_pojavlauncher/google-services.json not found."
            echo "Firebase/Google login may not work until you add it."
          fi

      - name: Show SHA-1 fingerprint for Firebase Google login
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          chmod +x gradlew

          echo "Generating Gradle signing report..."
          ./gradlew signingReport --no-daemon > ../signing-report.txt || true

          echo "----- SHA-1 lines -----"
          grep -n "SHA1:" ../signing-report.txt || true
          echo "-----------------------"

          echo "If Google login does not work:"
          echo "Copy the SHA1 from above into Firebase Project Settings > Android app > Add fingerprint."
          echo "Then download a new google-services.json."

      - name: Upload SHA-1 signing report
        uses: actions/upload-artifact@v4
        with:
          name: DURBIN-SHA1-signing-report
          path: signing-report.txt
          if-no-files-found: warn
          retention-days: 7

      - name: Build debug APK
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          chmod +x gradlew

          echo "Trying best build commands..."
          ./gradlew :app_pojavlauncher:assembleFullDebug --no-daemon --stacktrace \
          || ./gradlew :app_pojavlauncher:assembleDebug --no-daemon --stacktrace \
          || ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Collect one APK only
        shell: bash
        run: |
          mkdir -p apk-output

          echo "All APK files found:"
          find "$PROJECT_DIR" -type f -name "*.apk" -not -path "*/androidTest/*" -print -exec ls -lh {} \;

          python3 - <<'PY'
          from pathlib import Path
          import shutil
          import os

          project = Path(os.environ["PROJECT_DIR"])
          out = Path("apk-output")
          out.mkdir(exist_ok=True)

          apks = []
          for p in project.rglob("*.apk"):
              s = str(p).lower()
              if "androidtest" in s or "/test/" in s or p.name.lower().startswith("test"):
                  continue
              size = p.stat().st_size
              if size < 10 * 1024 * 1024:
                  continue
              apks.append(p)

          if not apks:
              print("No APK found. Showing possible output folders:")
              for p in project.rglob("*"):
                  if p.is_dir() and ("outputs" in str(p).lower() or "apk" in str(p).lower()):
                      print(p)
              raise SystemExit(1)

          def score(p):
              s = str(p).lower()
              points = 0
              # Prefer APKs that are usually installable on Android phones
              if "arm64" in s or "arm64-v8a" in s or "aarch64" in s:
                  points += 80
              if "release" in s:
                  points += 50
              if "debug" in s:
                  points += 40
              if "full" in s or "universal" in s:
                  points += 30
              if "unsigned" in s:
                  points -= 60
              # Prefer smaller APK if similar score
              return (points, -p.stat().st_size)

          chosen = sorted(apks, key=score, reverse=True)[0]
          target = out / "DURBIN-Launcher.apk"
          shutil.copy2(chosen, target)

          print("Chosen APK:", chosen)
          print("Chosen size MB:", round(chosen.stat().st_size / 1024 / 1024, 2))
          print("Output:", target)
          PY

          echo "Final APK output:"
          ls -lah apk-output

      - name: Sign APK if unsigned
        shell: bash
        run: |
          APK="apk-output/DURBIN-Launcher.apk"

          if unzip -l "$APK" | grep -E "META-INF/.*(RSA|DSA|EC)" >/dev/null; then
            echo "APK already signed ✅"
            exit 0
          fi

          echo "APK looks unsigned. Signing with debug key..."

          mkdir -p ~/.android

          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkeypair \
              -keystore ~/.android/debug.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -n 1)

          "$APKSIGNER" sign \
            --ks ~/.android/debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out apk-output/DURBIN-Launcher-signed.apk \
            "$APK"

          mv apk-output/DURBIN-Launcher-signed.apk "$APK"
          echo "Signed APK:"
          ls -lh "$APK"

      - name: Verify APK
        shell: bash
        run: |
          APK="apk-output/DURBIN-Launcher.apk"
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -n 1)
          "$APKSIGNER" verify --verbose "$APK" || true
          ls -lh "$APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DURBIN-Launcher-apk
          path: apk-output/DURBIN-Launcher.apk
          if-no-files-found: error
          retention-days: 7
