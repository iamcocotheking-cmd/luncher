name: Build DURBIN Launcher APK - Clear Diagnostics

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  diagnose-and-build:
    name: Diagnose and Build
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: "-Xmx6144m -XX:MaxMetaspaceSize=1536m -Dfile.encoding=UTF-8 -XX:+UseParallelGC"
      JAVA_TOOL_OPTIONS: "-Xmx6144m -XX:MaxMetaspaceSize=1536m -Dfile.encoding=UTF-8 -XX:+UseParallelGC"
      KOTLIN_DAEMON_JVMARGS: "-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8 -XX:+UseParallelGC"

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle 8.14.3
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.3"

      - name: Locate project and print repo info
        shell: bash
        run: |
          echo "========== DURBIN DIAGNOSTIC START =========="
          echo "Repo root:"
          pwd
          echo ""
          echo "Top level files:"
          ls -la
          echo ""
          echo "Gradle project candidates:"
          find . -maxdepth 4 -name build.gradle -o -name settings.gradle | sort

          if [ -f "PojavLauncher-3_openjdk/build.gradle" ]; then
            echo "PROJECT_DIR=PojavLauncher-3_openjdk" >> "$GITHUB_ENV"
            echo "Using project: PojavLauncher-3_openjdk"
          elif [ -f "build.gradle" ]; then
            echo "PROJECT_DIR=." >> "$GITHUB_ENV"
            echo "Using project: ."
          else
            echo "::error title=Gradle project not found::No build.gradle found. Your repo must contain PojavLauncher-3_openjdk or a Gradle project at root."
            exit 1
          fi

      - name: Fix required Android Gradle properties
        shell: bash
        run: |
          set -e
          PROP_FILE="$PROJECT_DIR/gradle.properties"
          touch "$PROP_FILE"

          set_prop() {
            KEY="$1"
            VALUE="$2"
            if grep -qE "^${KEY}[[:space:]]*=" "$PROP_FILE"; then
              sed -i "s|^${KEY}[[:space:]]*=.*|${KEY}=${VALUE}|" "$PROP_FILE"
            else
              printf "\n%s=%s\n" "$KEY" "$VALUE" >> "$PROP_FILE"
            fi
          }

          set_prop "android.useAndroidX" "true"
          set_prop "android.enableJetifier" "true"
          set_prop "org.gradle.jvmargs" "-Xmx6144m -XX:MaxMetaspaceSize=1536m -Dfile.encoding=UTF-8 -XX:+UseParallelGC"
          set_prop "kotlin.daemon.jvmargs" "-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8 -XX:+UseParallelGC"
          set_prop "kotlin.incremental" "false"
          set_prop "kotlin.compiler.execution.strategy" "in-process"

          ROOT_PROP_FILE="gradle.properties"
          touch "$ROOT_PROP_FILE"
          if [ "$PROP_FILE" != "$ROOT_PROP_FILE" ]; then
            for ENTRY in               "android.useAndroidX=true"               "android.enableJetifier=true"               "org.gradle.jvmargs=-Xmx6144m -XX:MaxMetaspaceSize=1536m -Dfile.encoding=UTF-8 -XX:+UseParallelGC"               "kotlin.daemon.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8 -XX:+UseParallelGC"               "kotlin.incremental=false"               "kotlin.compiler.execution.strategy=in-process"; do
              KEY="${ENTRY%%=*}"
              VALUE="${ENTRY#*=}"
              if grep -qE "^${KEY}[[:space:]]*=" "$ROOT_PROP_FILE"; then
                sed -i "s|^${KEY}[[:space:]]*=.*|${KEY}=${VALUE}|" "$ROOT_PROP_FILE"
              else
                printf "\n%s=%s\n" "$KEY" "$VALUE" >> "$ROOT_PROP_FILE"
              fi
            done
          fi

          echo "========== project gradle.properties after fix =========="
          cat "$PROP_FILE"
          echo "========== root gradle.properties after fix =========="
          cat "$ROOT_PROP_FILE"

      - name: Verify important source files
        shell: bash
        run: |
          set -e
          ROOT="$PROJECT_DIR"
          echo "========== Source checks =========="
          test -f "$ROOT/settings.gradle" || { echo "::error title=Missing settings.gradle::Expected $ROOT/settings.gradle"; exit 1; }
          test -f "$ROOT/app_pojavlauncher/build.gradle" || { echo "::error title=Missing app build.gradle::Expected $ROOT/app_pojavlauncher/build.gradle"; exit 1; }

          FORGE_DIR="$ROOT/forge_installer/src/main/java/git/artdeell/installer_agent"
          for file in ComponentFilter.java ComponentTimeoutTask.java MainWindowFilter.java DialogFilter.java Agent.java; do
            if [ ! -f "$FORGE_DIR/$file" ]; then
              echo "::error title=Missing Forge helper::$FORGE_DIR/$file is missing"
              exit 1
            fi
          done
          echo "Forge helper files OK."

          echo "Checking for real merge conflict markers..."
          if grep -RInI -E '^(<<<<<<<|=======|>>>>>>>)( |$)' \
            --exclude-dir=.git \
            --exclude-dir=.gradle \
            --exclude-dir=build \
            --exclude-dir=.cxx \
            --exclude='*.so' \
            --exclude='*.jar' \
            --exclude='*.png' \
            --exclude='*.webp' \
            --exclude='*.jpg' \
            --exclude='*.jpeg' \
            --exclude='*.zip' \
            "$ROOT" ; then
            echo "::error title=Merge conflict markers found::Remove <<<<<<< ======= >>>>>>> from files above."
            exit 1
          fi
          echo "No merge conflict markers found."

      - name: Show Gradle tasks and versions
        shell: bash
        run: |
          set -e
          cd "$PROJECT_DIR"
          echo "========== Gradle version =========="
          gradle --version
          echo "========== Projects =========="
          gradle projects --no-daemon
          echo "========== APK tasks matching FullDebug =========="
          gradle :app_pojavlauncher:tasks --all --no-daemon | grep -E "assemble.*Full.*Debug|FullDebug|assembleFullDebug" || true

      - name: Build APK with clear error output
        id: build_apk
        shell: bash
        run: |
          set +e
          cd "$PROJECT_DIR"
          echo "========== BUILD COMMAND =========="
          echo "gradle :app_pojavlauncher:assembleFullDebug --no-daemon --stacktrace --warning-mode all"
          echo ""
          gradle :app_pojavlauncher:assembleFullDebug --no-daemon --stacktrace --warning-mode all 2>&1 | tee ../durbin-build.log
          STATUS=${PIPESTATUS[0]}
          cd ..

          echo "========== DURBIN CLEAR ERROR SUMMARY =========="
          if [ "$STATUS" -ne 0 ]; then
            echo "Build failed. Important lines:"
            grep -nE "(^FAILURE:|^\* What went wrong:|^Execution failed|^> | error: |e: file:|Caused by:|A problem occurred|AndroidX|useAndroidX|cannot find symbol|Unresolved reference|Invalid workflow|YAML|No APK|permission_denied|Not enough memory|OOMErrorException|OutOfMemory|Kotlin daemon)" durbin-build.log | head -n 160 || true
            echo ""
            echo "Last 120 log lines:"
            tail -n 120 durbin-build.log

            if grep -q "android.useAndroidX" durbin-build.log; then
              echo "::error title=AndroidX property missing::android.useAndroidX=true was missing. This workflow patches gradle.properties. If it still appears, the wrong project folder is being built."
            elif grep -q "cannot find symbol" durbin-build.log; then
              echo "::error title=Java compile error::A Java class/file is missing. See cannot find symbol lines above."
            elif grep -q "Unresolved reference" durbin-build.log; then
              echo "::error title=Kotlin compile error::A Kotlin function/import/class is missing. See unresolved reference lines above."
            elif grep -qE "Not enough memory|OOMErrorException|OutOfMemory|Kotlin daemon" durbin-build.log; then
              echo "::error title=Kotlin compiler out of memory::V33 increases Gradle and Kotlin memory. If this still appears, use a larger runner or reduce Compose dependencies."
            elif grep -q "No APK" durbin-build.log; then
              echo "::error title=APK missing::Build ran but no APK was produced. See logs above."
            else
              echo "::error title=Build failed::See DURBIN CLEAR ERROR SUMMARY above."
            fi
            exit "$STATUS"
          fi

          echo "Build successful."

      - name: Collect APK
        if: success()
        shell: bash
        run: |
          mkdir -p apk-output
          APK="$(find "$PROJECT_DIR" -type f -name '*.apk' -path '*/outputs/apk/*debug/*.apk' | head -n 1)"
          if [ -z "$APK" ]; then
            echo "::error title=No APK found::Build succeeded but no debug APK was found."
            find "$PROJECT_DIR" -type f -name '*.apk' -print
            exit 1
          fi
          cp "$APK" apk-output/DURBIN-Launcher.apk
          ls -lh apk-output/DURBIN-Launcher.apk

      - name: Upload build log
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: DURBIN-build-log
          path: durbin-build.log
          retention-days: 3

      - name: Upload APK artifact
        if: success()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: DURBIN-Launcher-APK
          path: apk-output/DURBIN-Launcher.apk
          retention-days: 1

      - name: Upload APK to GitHub Release fallback
        if: success()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK_PATH="apk-output/DURBIN-Launcher.apk"
          TAG="durbin-build-${GITHUB_RUN_NUMBER}"
          TITLE="DURBIN Launcher Build ${GITHUB_RUN_NUMBER}"
          gh release create "$TAG" "$APK_PATH" --title "$TITLE" --notes "Auto-built DURBIN Launcher APK." --latest=false || gh release upload "$TAG" "$APK_PATH" --clobber


      - name: V34 resource linking guard
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          root = Path("PojavLauncher-3_openjdk")
          if not root.exists():
              root = Path(".")

          res = root / "app_pojavlauncher/src/main/res"
          values = res / "values"
          drawable = res / "drawable"
          values.mkdir(parents=True, exist_ok=True)
          drawable.mkdir(parents=True, exist_ok=True)

          dimens = values / "dimens.xml"
          dimens.write_text("""<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <dimen name="padding_tiny">1dp</dimen>
              <dimen name="padding_small">4dp</dimen>
              <dimen name="padding_moderate">8dp</dimen>
              <dimen name="padding_medium">12dp</dimen>
              <dimen name="padding_large">16dp</dimen>
              <dimen name="padding_heavy">24dp</dimen>
              <dimen name="padding_extra_large">32dp</dimen>
              <dimen name="padding_extra_extra_large">48dp</dimen>
              <dimen name="fragment_padding_medium">16dp</dimen>
              <dimen name="profile_editor_image_padding">8dp</dimen>
          </resources>
          """.replace("          ", ""), encoding="utf-8")

          social = drawable / "ic_social_media.xml"
          discord = drawable / "ic_discord.xml"
          if discord.exists():
              social.write_text(discord.read_text(encoding="utf-8"), encoding="utf-8")
          else:
              social.write_text("""<?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp"
              android:height="24dp"
              android:viewportWidth="24"
              android:viewportHeight="24">
              <path
                  android:fillColor="#FFFFFFFF"
                  android:pathData="M18,16.08C17.24,16.08 16.56,16.38 16.04,16.86L8.91,12.71C8.96,12.48 9,12.24 9,12C9,11.76 8.96,11.52 8.91,11.29L15.96,7.18C16.5,7.68 17.21,8 18,8C19.66,8 21,6.66 21,5C21,3.34 19.66,2 18,2C16.34,2 15,3.34 15,5C15,5.24 15.04,5.48 15.09,5.71L8.04,9.82C7.5,9.32 6.79,9 6,9C4.34,9 3,10.34 3,12C3,13.66 4.34,15 6,15C6.79,15 7.5,14.68 8.04,14.18L15.16,18.34C15.11,18.55 15.08,18.77 15.08,19C15.08,20.61 16.39,21.92 18,21.92C19.61,21.92 20.92,20.61 20.92,19C20.92,17.39 19.61,16.08 18,16.08Z"/>
          </vector>
          """.replace("          ", ""), encoding="utf-8")

          print("V34 resource guard OK")
          print("Added:", dimens)
          print("Added:", social)
          PY
