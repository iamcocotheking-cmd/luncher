name: Build DURBIN Launcher APK - Clear Diagnostics

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  diagnose-and-build:
    name: Diagnose and Build
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: "-Xmx6144m -XX:MaxMetaspaceSize=1536m -Dfile.encoding=UTF-8 -XX:+UseParallelGC"
      JAVA_TOOL_OPTIONS: "-Xmx6144m -XX:MaxMetaspaceSize=1536m -Dfile.encoding=UTF-8 -XX:+UseParallelGC"
      KOTLIN_DAEMON_JVMARGS: "-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8 -XX:+UseParallelGC"

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle 8.14.3
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.3"

      - name: Locate project and print repo info
        shell: bash
        run: |
          echo "========== DURBIN DIAGNOSTIC START =========="
          echo "Repo root:"
          pwd
          echo ""
          echo "Top level files:"
          ls -la
          echo ""
          echo "Gradle project candidates:"
          find . -maxdepth 4 -name build.gradle -o -name settings.gradle | sort

          if [ -f "PojavLauncher-3_openjdk/build.gradle" ]; then
            echo "PROJECT_DIR=PojavLauncher-3_openjdk" >> "$GITHUB_ENV"
            echo "Using project: PojavLauncher-3_openjdk"
          elif [ -f "build.gradle" ]; then
            echo "PROJECT_DIR=." >> "$GITHUB_ENV"
            echo "Using project: ."
          else
            echo "::error title=Gradle project not found::No build.gradle found. Your repo must contain PojavLauncher-3_openjdk or a Gradle project at root."
            exit 1
          fi

      - name: Fix required Android Gradle properties
        shell: bash
        run: |
          set -e
          PROP_FILE="$PROJECT_DIR/gradle.properties"
          touch "$PROP_FILE"

          set_prop() {
            KEY="$1"
            VALUE="$2"
            if grep -qE "^${KEY}[[:space:]]*=" "$PROP_FILE"; then
              sed -i "s|^${KEY}[[:space:]]*=.*|${KEY}=${VALUE}|" "$PROP_FILE"
            else
              printf "\n%s=%s\n" "$KEY" "$VALUE" >> "$PROP_FILE"
            fi
          }

          set_prop "android.useAndroidX" "true"
          set_prop "android.enableJetifier" "true"
          set_prop "org.gradle.jvmargs" "-Xmx6144m -XX:MaxMetaspaceSize=1536m -Dfile.encoding=UTF-8 -XX:+UseParallelGC"
          set_prop "kotlin.daemon.jvmargs" "-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8 -XX:+UseParallelGC"
          set_prop "kotlin.incremental" "false"
          set_prop "kotlin.compiler.execution.strategy" "in-process"

          ROOT_PROP_FILE="gradle.properties"
          touch "$ROOT_PROP_FILE"
          if [ "$PROP_FILE" != "$ROOT_PROP_FILE" ]; then
            for ENTRY in               "android.useAndroidX=true"               "android.enableJetifier=true"               "org.gradle.jvmargs=-Xmx6144m -XX:MaxMetaspaceSize=1536m -Dfile.encoding=UTF-8 -XX:+UseParallelGC"               "kotlin.daemon.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8 -XX:+UseParallelGC"               "kotlin.incremental=false"               "kotlin.compiler.execution.strategy=in-process"; do
              KEY="${ENTRY%%=*}"
              VALUE="${ENTRY#*=}"
              if grep -qE "^${KEY}[[:space:]]*=" "$ROOT_PROP_FILE"; then
                sed -i "s|^${KEY}[[:space:]]*=.*|${KEY}=${VALUE}|" "$ROOT_PROP_FILE"
              else
                printf "\n%s=%s\n" "$KEY" "$VALUE" >> "$ROOT_PROP_FILE"
              fi
            done
          fi

          echo "========== project gradle.properties after fix =========="
          cat "$PROP_FILE"
          echo "========== root gradle.properties after fix =========="
          cat "$ROOT_PROP_FILE"

      - name: Verify important source files
        shell: bash
        run: |
          set -e
          ROOT="$PROJECT_DIR"
          echo "========== Source checks =========="
          test -f "$ROOT/settings.gradle" || { echo "::error title=Missing settings.gradle::Expected $ROOT/settings.gradle"; exit 1; }
          test -f "$ROOT/app_pojavlauncher/build.gradle" || { echo "::error title=Missing app build.gradle::Expected $ROOT/app_pojavlauncher/build.gradle"; exit 1; }

          FORGE_DIR="$ROOT/forge_installer/src/main/java/git/artdeell/installer_agent"
          for file in ComponentFilter.java ComponentTimeoutTask.java MainWindowFilter.java DialogFilter.java Agent.java; do
            if [ ! -f "$FORGE_DIR/$file" ]; then
              echo "::error title=Missing Forge helper::$FORGE_DIR/$file is missing"
              exit 1
            fi
          done
          echo "Forge helper files OK."

          echo "Checking for real merge conflict markers..."
          if grep -RInI -E '^(<<<<<<<|=======|>>>>>>>)( |$)' \
            --exclude-dir=.git \
            --exclude-dir=.gradle \
            --exclude-dir=build \
            --exclude-dir=.cxx \
            --exclude='*.so' \
            --exclude='*.jar' \
            --exclude='*.png' \
            --exclude='*.webp' \
            --exclude='*.jpg' \
            --exclude='*.jpeg' \
            --exclude='*.zip' \
            "$ROOT" ; then
            echo "::error title=Merge conflict markers found::Remove <<<<<<< ======= >>>>>>> from files above."
            exit 1
          fi
          echo "No merge conflict markers found."

      - name: Show Gradle tasks and versions
        shell: bash
        run: |
          set -e
          cd "$PROJECT_DIR"
          echo "========== Gradle version =========="
          gradle --version
          echo "========== Projects =========="
          gradle projects --no-daemon
          echo "========== APK tasks matching FullDebug =========="
          gradle :app_pojavlauncher:tasks --all --no-daemon | grep -E "assemble.*Full.*Debug|FullDebug|assembleFullDebug" || true


      - name: V37 deep preflight resource and bridge guard
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re
          root = Path("PojavLauncher-3_openjdk")
          if not root.exists(): root = Path(".")
          src = root / "app_pojavlauncher/src/main/java"
          res = root / "app_pojavlauncher/src/main/res"
          values = res / "values"; drawable = res / "drawable"; layout = res / "layout"
          values.mkdir(parents=True, exist_ok=True); drawable.mkdir(parents=True, exist_ok=True); layout.mkdir(parents=True, exist_ok=True)
          required = [
              src/"net/kdt/pojavlaunch/modloaders/ModloaderDownloadListener.java",
              src/"net/kdt/pojavlaunch/modloaders/ModloaderListenerProxy.java",
              src/"net/kdt/pojavlaunch/modloaders/FabricVersion.java",
              src/"net/kdt/pojavlaunch/extra/ExtraListener.java",
              src/"net/kdt/pojavlaunch/progresskeeper/ProgressListener.java",
              src/"net/kdt/pojavlaunch/profiles/VersionSelectorListener.java",
              src/"com/kdt/pickafile/FileListView.java",
              src/"com/kdt/pickafile/FileSelectedListener.java",
              src/"net/kdt/pojavlaunch/customcontrols/ControlJoystickData.java",
              src/"net/kdt/pojavlaunch/modloaders/modpacks/models/ModItem.java",
              src/"net/kdt/pojavlaunch/modloaders/modpacks/models/SearchFilters.java",
              src/"net/kdt/pojavlaunch/modloaders/modpacks/models/SearchResult.java",
              src/"net/kdt/pojavlaunch/modloaders/modpacks/models/Constants.java",
              src/"net/kdt/pojavlaunch/modloaders/modpacks/models/CurseManifest.java",
          ]
          missing_sources = [str(p) for p in required if not p.exists()]
          if missing_sources:
              print("Missing source bridge files:")
              print("\n".join(missing_sources))
              raise SystemExit(1)
          existing = {}
          for d in res.iterdir():
              if d.is_dir():
                  typ = d.name.split("-")[0]
                  for f in d.iterdir():
                      if f.is_file(): existing.setdefault(typ,set()).add(f.stem)
          for vf in values.glob("*.xml"):
              txt = vf.read_text(encoding="utf-8", errors="ignore")
              for typ,name in re.findall(r'<(dimen|string|color|bool|integer|array|string-array|integer-array)\s+[^>]*name="([^"]+)"', txt):
                  if typ in ("string-array","integer-array"): typ="array"
                  existing.setdefault(typ,set()).add(name)
              for name in re.findall(r'<item\s+type="id"\s+name="([^"]+)"', txt): existing.setdefault("id",set()).add(name)
          refs = {}
          for f in res.rglob("*.xml"):
              txt = f.read_text(encoding="utf-8", errors="ignore")
              for typ,name in re.findall(r'@([a-zA-Z0-9_]+)/([A-Za-z0-9_\.]+)', txt):
                  if typ != "android": refs.setdefault(typ,set()).add(name)
          for f in src.rglob("*"):
              if f.suffix in (".kt", ".java"):
                  txt = f.read_text(encoding="utf-8", errors="ignore")
                  for typ,name in re.findall(r'R\.([a-zA-Z0-9_]+)\.([A-Za-z0-9_]+)', txt):
                      if typ in {"drawable","dimen","id","array","string","color","layout"}: refs.setdefault(typ,set()).add(name)
          refs.setdefault("drawable", set()).update(["ic_auth_ms","ic_auth_elyby","ic_px_theme","ic_px_download","ic_px_file","ic_px_refresh","ic_px_progress","ic_filter"])
          refs.setdefault("dimen", set()).update(["_50sdp","_280sdp"])
          refs.setdefault("string", set()).update(["cancel","ok","copy","curseforge_api_key"])
          missing = {typ: sorted(names-existing.get(typ,set())) for typ,names in refs.items()}
          missing = {k:v for k,v in missing.items() if v}
          value_lines = ['<?xml version="1.0" encoding="utf-8"?>','<resources>']
          for name in missing.get("dimen",[]):
              m = re.match(r'_(\d+)(sdp|ssp)$', name)
              val = f"{m.group(1)}{'sp' if m and m.group(2)=='ssp' else 'dp'}" if m else "8dp"
              value_lines.append(f'    <dimen name="{name}">{val}</dimen>')
          for name in missing.get("id",[]): value_lines.append(f'    <item type="id" name="{name}"/>')
          for name in missing.get("array",[]): value_lines.append(f'    <string-array name="{name}"><item>default</item></string-array>')
          for name in missing.get("string",[]):
              if name in {"application_package","storageProviderAuthorities"}: continue
              text = {"ok":"OK","cancel":"Cancel","copy":"Copy","curseforge_api_key":""}.get(name, name.replace("_"," "))
              value_lines.append(f'    <string name="{name}" formatted="false">{text}</string>')
          value_lines.append('</resources>')
          (values/"durbin_v37_runtime_fallbacks.xml").write_text("\n".join(value_lines)+"\n", encoding="utf-8")
          vector = '<?xml version="1.0" encoding="utf-8"?>\n<vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="24dp" android:height="24dp" android:viewportWidth="24" android:viewportHeight="24">\n    <path android:fillColor="#FFFFFFFF" android:pathData="M4,4h16v16H4z"/>\n</vector>\n'
          for name in sorted(set(missing.get("drawable",[])) | refs.get("drawable",set())):
              out = drawable/f"{name}.xml"
              if not out.exists(): out.write_text(vector, encoding="utf-8")
          generic = '<?xml version="1.0" encoding="utf-8"?>\n<LinearLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical"><TextView android:id="@+id/account_item" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="Item"/><TextView android:id="@+id/mod_title_textview" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="Title"/><TextView android:id="@+id/mod_body_textview" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="Body"/><ImageView android:id="@+id/mod_thumbnail_imageview" android:layout_width="48dp" android:layout_height="48dp"/><ImageView android:id="@+id/mod_source_imageview" android:layout_width="24dp" android:layout_height="24dp"/><ImageView android:id="@+id/delete_account_button" android:layout_width="48dp" android:layout_height="48dp"/><ViewStub android:id="@+id/mod_limited_state_stub" android:layout_width="match_parent" android:layout_height="wrap_content" android:layout="@layout/durbin_mod_extended_fallback"/></LinearLayout>\n'
          (layout/"durbin_mod_extended_fallback.xml").write_text('<?xml version="1.0" encoding="utf-8"?><LinearLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical"><Button android:id="@+id/mod_extended_select_version_button" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="Install"/><Spinner android:id="@+id/mod_extended_version_spinner" android:layout_width="match_parent" android:layout_height="wrap_content"/><TextView android:id="@+id/mod_extended_error_textview" android:layout_width="match_parent" android:layout_height="wrap_content"/></LinearLayout>', encoding="utf-8")
          for name in sorted(refs.get("layout",set()) - existing.get("layout",set())):
              out = layout/f"{name}.xml"
              if not out.exists(): out.write_text(generic, encoding="utf-8")
          print("========== V37 DEEP PREFLIGHT ==========")
          print("Source bridge files OK:", len(required))
          print("Resource refs handled:", {k: len(v) for k,v in missing.items()})
          PY

      - name: Build APK with clear error output
        id: build_apk
        shell: bash
        run: |
          set +e
          cd "$PROJECT_DIR"
          echo "========== BUILD COMMAND =========="
          echo "gradle :app_pojavlauncher:assembleFullDebug --no-daemon --stacktrace --warning-mode all"
          echo ""
          gradle :app_pojavlauncher:assembleFullDebug --no-daemon --stacktrace --warning-mode all 2>&1 | tee ../durbin-build.log
          STATUS=${PIPESTATUS[0]}
          cd ..

          echo "========== DURBIN CLEAR ERROR SUMMARY =========="
          if [ "$STATUS" -ne 0 ]; then
            echo "Build failed. Important lines:"
            grep -nE "(^FAILURE:|^\* What went wrong:|^Execution failed|^> | error: |e: file:|Caused by:|A problem occurred|AndroidX|useAndroidX|cannot find symbol|Unresolved reference|Invalid workflow|YAML|No APK|permission_denied|Not enough memory|OOMErrorException|OutOfMemory|Kotlin daemon)" durbin-build.log | head -n 160 || true
            echo ""
            echo "Last 120 log lines:"
            tail -n 120 durbin-build.log

            if grep -q "android.useAndroidX" durbin-build.log; then
              echo "::error title=AndroidX property missing::android.useAndroidX=true was missing. This workflow patches gradle.properties. If it still appears, the wrong project folder is being built."
            elif grep -q "cannot find symbol" durbin-build.log; then
              echo "::error title=Java compile error::A Java class/file is missing. See cannot find symbol lines above."
            elif grep -q "Unresolved reference" durbin-build.log; then
              echo "::error title=Kotlin compile error::A Kotlin function/import/class is missing. See unresolved reference lines above."
            elif grep -qE "Not enough memory|OOMErrorException|OutOfMemory|Kotlin daemon" durbin-build.log; then
              echo "::error title=Kotlin compiler out of memory::V33 increases Gradle and Kotlin memory. If this still appears, use a larger runner or reduce Compose dependencies."
            elif grep -q "No APK" durbin-build.log; then
              echo "::error title=APK missing::Build ran but no APK was produced. See logs above."
            else
              echo "::error title=Build failed::See DURBIN CLEAR ERROR SUMMARY above."
            fi
            exit "$STATUS"
          fi

          echo "Build successful."

      - name: Collect APK
        if: success()
        shell: bash
        run: |
          mkdir -p apk-output
          APK="$(find "$PROJECT_DIR" -type f -name '*.apk' -path '*/outputs/apk/*debug/*.apk' | head -n 1)"
          if [ -z "$APK" ]; then
            echo "::error title=No APK found::Build succeeded but no debug APK was found."
            find "$PROJECT_DIR" -type f -name '*.apk' -print
            exit 1
          fi
          cp "$APK" apk-output/DURBIN-Launcher.apk
          ls -lh apk-output/DURBIN-Launcher.apk

      - name: Upload build log
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: DURBIN-build-log
          path: durbin-build.log
          retention-days: 3

      - name: Upload APK artifact
        if: success()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: DURBIN-Launcher-APK
          path: apk-output/DURBIN-Launcher.apk
          retention-days: 1

      - name: Upload APK to GitHub Release fallback
        if: success()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK_PATH="apk-output/DURBIN-Launcher.apk"
          TAG="durbin-build-${GITHUB_RUN_NUMBER}"
          TITLE="DURBIN Launcher Build ${GITHUB_RUN_NUMBER}"
          gh release create "$TAG" "$APK_PATH" --title "$TITLE" --notes "Auto-built DURBIN Launcher APK." --latest=false || gh release upload "$TAG" "$APK_PATH" --clobber


      - name: V36 source bridge sanity check
        shell: bash
        run: |
          set -e
          SRC="$PROJECT_DIR/app_pojavlauncher/src/main/java"
          RES="$PROJECT_DIR/app_pojavlauncher/src/main/res"
          echo "Checking V36 bridge files..."
          test -f "$SRC/net/kdt/pojavlaunch/modloaders/ModloaderDownloadListener.java"
          test -f "$SRC/net/kdt/pojavlaunch/modloaders/ModloaderListenerProxy.java"
          test -f "$SRC/net/kdt/pojavlaunch/modloaders/FabricVersion.java"
          test -f "$SRC/net/kdt/pojavlaunch/extra/ExtraListener.java"
          test -f "$SRC/net/kdt/pojavlaunch/progresskeeper/ProgressListener.java"
          test -f "$SRC/net/kdt/pojavlaunch/profiles/VersionSelectorListener.java"
          test -f "$SRC/com/kdt/pickafile/FileListView.java"
          test -f "$SRC/net/kdt/pojavlaunch/modloaders/modpacks/models/ModItem.java"
          test -f "$SRC/net/kdt/pojavlaunch/customcontrols/ControlJoystickData.java"
          test -f "$RES/values/durbin_v36_missing_resources.xml"
          test -f "$RES/drawable/ic_px_download.xml"
          echo "V36 bridge files OK."
