name: Build DURBIN Launcher

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle 8.11.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1

      - name: Install Android build tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "cmake;3.22.1" \
            "ndk;29.0.14206865" \
            "platforms;android-35" \
            "build-tools;35.0.0" || true

      - name: Build APK
        shell: bash
        run: |
          cd PojavLauncher-3_openjdk
          gradle :app_pojavlauncher:assembleFullDebug --no-daemon --stacktrace

      - name: Collect APK
        shell: bash
        run: |
          mkdir -p apk-output
          APK_PATH="$(find PojavLauncher-3_openjdk -type f -name '*.apk' -not -path '*/androidTest/*' -size +10M | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "No APK found"
            find PojavLauncher-3_openjdk -type f -name '*.apk' -print
            exit 1
          fi
          cp "$APK_PATH" apk-output/DURBIN-Launcher.apk
          ls -lh apk-output/DURBIN-Launcher.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DURBIN-Launcher-apk
          path: apk-output/DURBIN-Launcher.apk
          if-no-files-found: error
