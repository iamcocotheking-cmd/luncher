name: Get SHA1 for Firebase

on:
  workflow_dispatch:

jobs:
  sha1:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle 8.11.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1

      - name: Get SHA1 for Firebase
        shell: bash
        run: |
          cd PojavLauncher-3_openjdk
          mkdir -p ~/.android

          keytool -genkeypair \
            -keystore ~/.android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" || true

          chmod +x gradlew || true
          ./gradlew :app_pojavlauncher:signingReport --no-daemon | grep SHA1
