name: Build DURBIN Launcher APK - Clear Diagnostics

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  diagnose-and-build:
    name: Diagnose and Build
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: "-Xmx6144m -XX:MaxMetaspaceSize=1536m -Dfile.encoding=UTF-8 -XX:+UseParallelGC"
      JAVA_TOOL_OPTIONS: "-Xmx6144m -XX:MaxMetaspaceSize=1536m -Dfile.encoding=UTF-8 -XX:+UseParallelGC"
      KOTLIN_DAEMON_JVMARGS: "-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8 -XX:+UseParallelGC"

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle 8.14.3
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.3"

      - name: Locate project and print repo info
        shell: bash
        run: |
          echo "========== DURBIN DIAGNOSTIC START =========="
          echo "Repo root:"
          pwd
          echo ""
          echo "Top level files:"
          ls -la
          echo ""
          echo "Gradle project candidates:"
          find . -maxdepth 4 -name build.gradle -o -name settings.gradle | sort

          if [ -f "PojavLauncher-3_openjdk/build.gradle" ]; then
            echo "PROJECT_DIR=PojavLauncher-3_openjdk" >> "$GITHUB_ENV"
            echo "Using project: PojavLauncher-3_openjdk"
          elif [ -f "build.gradle" ]; then
            echo "PROJECT_DIR=." >> "$GITHUB_ENV"
            echo "Using project: ."
          else
            echo "::error title=Gradle project not found::No build.gradle found. Your repo must contain PojavLauncher-3_openjdk or a Gradle project at root."
            exit 1
          fi

      - name: Fix required Android Gradle properties
        shell: bash
        run: |
          set -e
          PROP_FILE="$PROJECT_DIR/gradle.properties"
          touch "$PROP_FILE"

          set_prop() {
            KEY="$1"
            VALUE="$2"
            if grep -qE "^${KEY}[[:space:]]*=" "$PROP_FILE"; then
              sed -i "s|^${KEY}[[:space:]]*=.*|${KEY}=${VALUE}|" "$PROP_FILE"
            else
              printf "\n%s=%s\n" "$KEY" "$VALUE" >> "$PROP_FILE"
            fi
          }

          set_prop "android.useAndroidX" "true"
          set_prop "android.enableJetifier" "true"
          set_prop "org.gradle.jvmargs" "-Xmx6144m -XX:MaxMetaspaceSize=1536m -Dfile.encoding=UTF-8 -XX:+UseParallelGC"
          set_prop "kotlin.daemon.jvmargs" "-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8 -XX:+UseParallelGC"
          set_prop "kotlin.incremental" "false"
          set_prop "kotlin.compiler.execution.strategy" "in-process"

          ROOT_PROP_FILE="gradle.properties"
          touch "$ROOT_PROP_FILE"
          if [ "$PROP_FILE" != "$ROOT_PROP_FILE" ]; then
            for ENTRY in               "android.useAndroidX=true"               "android.enableJetifier=true"               "org.gradle.jvmargs=-Xmx6144m -XX:MaxMetaspaceSize=1536m -Dfile.encoding=UTF-8 -XX:+UseParallelGC"               "kotlin.daemon.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8 -XX:+UseParallelGC"               "kotlin.incremental=false"               "kotlin.compiler.execution.strategy=in-process"; do
              KEY="${ENTRY%%=*}"
              VALUE="${ENTRY#*=}"
              if grep -qE "^${KEY}[[:space:]]*=" "$ROOT_PROP_FILE"; then
                sed -i "s|^${KEY}[[:space:]]*=.*|${KEY}=${VALUE}|" "$ROOT_PROP_FILE"
              else
                printf "\n%s=%s\n" "$KEY" "$VALUE" >> "$ROOT_PROP_FILE"
              fi
            done
          fi

          echo "========== project gradle.properties after fix =========="
          cat "$PROP_FILE"
          echo "========== root gradle.properties after fix =========="
          cat "$ROOT_PROP_FILE"

      - name: Verify important source files
        shell: bash
        run: |
          set -e
          ROOT="$PROJECT_DIR"
          echo "========== Source checks =========="
          test -f "$ROOT/settings.gradle" || { echo "::error title=Missing settings.gradle::Expected $ROOT/settings.gradle"; exit 1; }
          test -f "$ROOT/app_pojavlauncher/build.gradle" || { echo "::error title=Missing app build.gradle::Expected $ROOT/app_pojavlauncher/build.gradle"; exit 1; }

          FORGE_DIR="$ROOT/forge_installer/src/main/java/git/artdeell/installer_agent"
          for file in ComponentFilter.java ComponentTimeoutTask.java MainWindowFilter.java DialogFilter.java Agent.java; do
            if [ ! -f "$FORGE_DIR/$file" ]; then
              echo "::error title=Missing Forge helper::$FORGE_DIR/$file is missing"
              exit 1
            fi
          done
          echo "Forge helper files OK."

          echo "Checking for real merge conflict markers..."
          if grep -RInI -E '^(<<<<<<<|=======|>>>>>>>)( |$)' \
            --exclude-dir=.git \
            --exclude-dir=.gradle \
            --exclude-dir=build \
            --exclude-dir=.cxx \
            --exclude='*.so' \
            --exclude='*.jar' \
            --exclude='*.png' \
            --exclude='*.webp' \
            --exclude='*.jpg' \
            --exclude='*.jpeg' \
            --exclude='*.zip' \
            "$ROOT" ; then
            echo "::error title=Merge conflict markers found::Remove <<<<<<< ======= >>>>>>> from files above."
            exit 1
          fi
          echo "No merge conflict markers found."

      - name: Show Gradle tasks and versions
        shell: bash
        run: |
          set -e
          cd "$PROJECT_DIR"
          echo "========== Gradle version =========="
          gradle --version
          echo "========== Projects =========="
          gradle projects --no-daemon
          echo "========== APK tasks matching FullDebug =========="
          gradle :app_pojavlauncher:tasks --all --no-daemon | grep -E "assemble.*Full.*Debug|FullDebug|assembleFullDebug" || true

      - name: V35 resource guard BEFORE build
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          root = Path("PojavLauncher-3_openjdk")
          if not root.exists():
              root = Path(".")

          res = root / "app_pojavlauncher/src/main/res"
          values = res / "values"
          drawable = res / "drawable"
          values.mkdir(parents=True, exist_ok=True)
          drawable.mkdir(parents=True, exist_ok=True)

          def collect_resources():
              existing = {}
              for d in res.iterdir():
                  if not d.is_dir():
                      continue
                  typ = d.name.split("-")[0]
                  for f in d.iterdir():
                      if f.is_file():
                          existing.setdefault(typ, set()).add(f.stem)

              for vf in values.glob("*.xml"):
                  txt = vf.read_text(encoding="utf-8", errors="ignore")
                  for typ, name in re.findall(r'<(dimen|string|color|style|bool|integer|item|array|string-array|integer-array)\s+[^>]*name="([^"]+)"', txt):
                      if typ in ("string-array", "integer-array"):
                          typ = "array"
                      existing.setdefault(typ, set()).add(name)
                  for name in re.findall(r'<item\s+type="id"\s+name="([^"]+)"', txt):
                      existing.setdefault("id", set()).add(name)
              return existing

          def find_refs():
              refs = {}
              for f in res.rglob("*.xml"):
                  txt = f.read_text(encoding="utf-8", errors="ignore")
                  for typ, name in re.findall(r'@([a-zA-Z0-9_]+)/([a-zA-Z0-9_]+)', txt):
                      if typ in {"android"}:
                          continue
                      refs.setdefault(typ, set()).add(name)
              return refs

          existing = collect_resources()
          refs = find_refs()
          missing = {typ: sorted(names - existing.get(typ, set())) for typ, names in refs.items()}
          missing = {typ: names for typ, names in missing.items() if names}

          # Never create application_package here because build.gradle already creates it using resValue.
          missing.get("string", [])[:] = [n for n in missing.get("string", []) if n != "application_package"]

          value_lines = ['<?xml version="1.0" encoding="utf-8"?>', '<resources>']
          for name in missing.get("dimen", []):
              value = "8dp"
              m = re.match(r'_(\d+)(sdp|ssp)$', name)
              if m:
                  value = f"{m.group(1)}{'sp' if m.group(2) == 'ssp' else 'dp'}"
              elif "tiny" in name:
                  value = "1dp"
              elif "small" in name:
                  value = "4dp"
              elif "moderate" in name:
                  value = "8dp"
              elif "medium" in name:
                  value = "12dp"
              elif "large" in name:
                  value = "16dp"
              elif "heavy" in name:
                  value = "24dp"
              value_lines.append(f'    <dimen name="{name}">{value}</dimen>')
          for name in missing.get("array", []):
              if name.endswith("_values"):
                  value_lines.append(f'    <string-array name="{name}"><item>official</item><item>mirror</item></string-array>')
              else:
                  value_lines.append(f'    <string-array name="{name}"><item>Official</item><item>Mirror</item></string-array>')
          for name in missing.get("id", []):
              value_lines.append(f'    <item type="id" name="{name}"/>')
          value_lines.append('</resources>')
          (values / "durbin_fallback_resources.xml").write_text("\n".join(value_lines) + "\n", encoding="utf-8")

          vector_generic = '<?xml version="1.0" encoding="utf-8"?>\n<vector xmlns:android="http://schemas.android.com/apk/res/android"\n    android:width="24dp"\n    android:height="24dp"\n    android:viewportWidth="24"\n    android:viewportHeight="24">\n    <path android:fillColor="#FFFFFFFF" android:pathData="M4,4h16v16h-16z"/>\n</vector>\n'
          vector_folder = '<?xml version="1.0" encoding="utf-8"?>\n<vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="24dp" android:height="24dp" android:viewportWidth="24" android:viewportHeight="24">\n    <path android:fillColor="#FFFFFFFF" android:pathData="M10,4l2,2h8c1.1,0 2,0.9 2,2v10c0,1.1 -0.9,2 -2,2H4c-1.1,0 -2,-0.9 -2,-2V6c0,-1.1 0.9,-2 2,-2z"/>\n</vector>\n'
          vector_gamepad = '<?xml version="1.0" encoding="utf-8"?>\n<vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="24dp" android:height="24dp" android:viewportWidth="24" android:viewportHeight="24">\n    <path android:fillColor="#FFFFFFFF" android:pathData="M7,10h2v2h2v2H9v2H7v-2H5v-2h2zM16.5,13.5a1.5,1.5 0,1 0,0.1,0M19,11a1.5,1.5 0,1 0,0.1,0M6,7h12c2,0 3,1.3 3.4,3.1l1,5c0.4,2.2 -1.4,4 -3.2,2.7L16.5,16h-9l-2.7,1.8C3,19 1.2,17.3 1.6,15.1l1,-5C3,8.3 4,7 6,7z"/>\n</vector>\n'
          vector_share = '<?xml version="1.0" encoding="utf-8"?>\n<vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="24dp" android:height="24dp" android:viewportWidth="24" android:viewportHeight="24">\n    <path android:fillColor="#FFFFFFFF" android:pathData="M18,16.1c-0.8,0 -1.5,0.3 -2,0.9L8.9,12.8c0.1,-0.3 0.1,-0.5 0.1,-0.8s0,-0.5 -0.1,-0.8L16,7c0.5,0.5 1.2,0.9 2,0.9c1.7,0 3,-1.3 3,-3s-1.3,-3 -3,-3s-3,1.3 -3,3c0,0.3 0,0.5 0.1,0.8L8,9.9C7.5,9.4 6.8,9 6,9c-1.7,0 -3,1.3 -3,3s1.3,3 3,3c0.8,0 1.5,-0.3 2,-0.9l7.1,4.2c-0.1,0.2 -0.1,0.5 -0.1,0.7c0,1.6 1.3,2.9 2.9,2.9S20.8,20.6 20.8,19S19.6,16.1 18,16.1z"/>\n</vector>\n'
          vector_arrow_down = '<?xml version="1.0" encoding="utf-8"?>\n<vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="24dp" android:height="24dp" android:viewportWidth="24" android:viewportHeight="24">\n    <path android:fillColor="#FFFFFFFF" android:pathData="M7,10l5,5l5,-5z"/>\n</vector>\n'
          vector_arrow_right = '<?xml version="1.0" encoding="utf-8"?>\n<vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="24dp" android:height="24dp" android:viewportWidth="24" android:viewportHeight="24">\n    <path android:fillColor="#FFFFFFFF" android:pathData="M10,7l5,5l-5,5z"/>\n</vector>\n'
          shape_line = '<?xml version="1.0" encoding="utf-8"?>\n<shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">\n    <solid android:color="#303030"/>\n    <corners android:radius="12dp"/>\n    <stroke android:width="1dp" android:color="#40FFFFFF"/>\n</shape>\n'
          shape_overlay = '<?xml version="1.0" encoding="utf-8"?>\n<shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">\n    <solid android:color="#CC000000"/>\n</shape>\n'

          def drawable_content(name):
              if name in {"background_line", "background_card"}:
                  return shape_line
              if name in {"background_overlay", "no_focus_shown"}:
                  return shape_overlay
              if name == "spinner_arrow":
                  return vector_arrow_down
              if name == "spinner_arrow_right":
                  return vector_arrow_right
              if name == "ic_px_folder":
                  return vector_folder
              if name == "ic_px_gamepad":
                  return vector_gamepad
              if name in {"ic_px_sharelog", "ic_telegram"}:
                  return vector_share
              return vector_generic

          needed_drawables = set(missing.get("drawable", [])) | {
              "ic_telegram", "ic_mouse_pointer", "spinner_arrow_right", "ic_px_edit", "background_line",
              "spinner_arrow", "ic_px_gamepad", "ic_px_java_run", "ic_px_sharelog", "ic_px_folder",
              "background_card", "background_overlay", "no_focus_shown"
          }
          for name in sorted(needed_drawables):
              f = drawable / f"{name}.xml"
              if not f.exists():
                  f.write_text(drawable_content(name), encoding="utf-8")

          print("========== V35 RESOURCE GUARD ==========")
          print("Created fallback values:", values / "durbin_fallback_resources.xml")
          print("Missing refs handled:", {k: len(v) for k, v in missing.items()})
          print("Drawable fallbacks checked:", len(needed_drawables))
          PY


      - name: V38 duplicate resource cleanup
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          root = Path("PojavLauncher-3_openjdk")
          if not root.exists():
              root = Path(".")

          res = root / "app_pojavlauncher/src/main/res"
          drawable = res / "drawable"
          values = res / "values"

          print("========== V38 DUPLICATE RESOURCE CLEANUP ==========")

          # Android treats icon.png and icon.xml as the same @drawable/icon.
          # If a real image exists, delete fallback XML with the same basename.
          removed = []
          image_exts = {".png", ".webp", ".jpg", ".jpeg"}
          for folder in [drawable] + sorted(res.glob("drawable-*")):
              if not folder.exists():
                  continue
              by_name = {}
              for f in folder.iterdir():
                  if f.is_file():
                      by_name.setdefault(f.stem, []).append(f)
              for name, files in by_name.items():
                  has_real_image = any(f.suffix.lower() in image_exts for f in files)
                  if has_real_image:
                      for f in files:
                          if f.suffix.lower() == ".xml":
                              removed.append(str(f.relative_to(root)))
                              f.unlink()

          # Do not let generated fallback value files redefine IDs already defined in real project values.
          real_defined_ids = set()
          fallback_files = []
          for vf in values.glob("*.xml"):
              if vf.name.startswith("durbin_"):
                  fallback_files.append(vf)
                  continue
              txt = vf.read_text(encoding="utf-8", errors="ignore")
              real_defined_ids.update(re.findall(r'<item[^>]*type="id"[^>]*name="([^"]+)"[^>]*/?>', txt))
              real_defined_ids.update(re.findall(r'<item[^>]*name="([^"]+)"[^>]*type="id"[^>]*/?>', txt))

          for vf in fallback_files:
              txt = vf.read_text(encoding="utf-8", errors="ignore")
              before = txt
              for name in sorted(real_defined_ids):
                  txt = re.sub(r'\n\s*<item[^>]*type="id"[^>]*name="' + re.escape(name) + r'"[^>]*/>', '', txt)
                  txt = re.sub(r'\n\s*<item[^>]*name="' + re.escape(name) + r'"[^>]*type="id"[^>]*/>', '', txt)
              if txt != before:
                  vf.write_text(txt, encoding="utf-8")
                  print("Cleaned duplicate IDs from", vf.relative_to(root))

          # Final duplicate scan for drawable/id resources that would fail mergeResources.
          dupes = []
          for typ_dir in [drawable] + sorted(res.glob("drawable-*")):
              if not typ_dir.exists():
                  continue
              seen = {}
              for f in typ_dir.iterdir():
                  if f.is_file():
                      seen.setdefault(f.stem, []).append(f.name)
              for name, files in seen.items():
                  if len(files) > 1:
                      dupes.append(f"{typ_dir.relative_to(root)}/{name}: {files}")

          # Check duplicate id items across all values xml.
          id_owner = {}
          for vf in values.glob("*.xml"):
              txt = vf.read_text(encoding="utf-8", errors="ignore")
              ids = set(re.findall(r'<item[^>]*type="id"[^>]*name="([^"]+)"[^>]*/?>', txt))
              ids.update(re.findall(r'<item[^>]*name="([^"]+)"[^>]*type="id"[^>]*/?>', txt))
              for name in ids:
                  if name in id_owner:
                      dupes.append(f"id/{name}: {id_owner[name].relative_to(root)} and {vf.relative_to(root)}")
                  else:
                      id_owner[name] = vf

          print("Removed duplicate drawable XML files:", removed)
          if dupes:
              print("Duplicate resources still found:")
              print("\n".join(dupes[:80]))
              raise SystemExit(1)
          print("No duplicate drawable/id resources detected")
          PY

      - name: Build APK with clear error output
        id: build_apk
        shell: bash
        run: |
          set +e
          cd "$PROJECT_DIR"
          echo "========== BUILD COMMAND =========="
          echo "gradle :app_pojavlauncher:assembleFullDebug --no-daemon --stacktrace --warning-mode summary"
          echo ""
          gradle :app_pojavlauncher:assembleFullDebug --no-daemon --stacktrace --warning-mode summary 2>&1 | tee ../durbin-build.log
          STATUS=${PIPESTATUS[0]}
          cd ..

          echo "========== DURBIN CLEAR ERROR SUMMARY =========="
          if [ "$STATUS" -ne 0 ]; then
            echo "Build failed. Important lines:"
            grep -nE "(^FAILURE:|^\* What went wrong:|^Execution failed|^> | error: |e: file:|Caused by:|A problem occurred|AndroidX|useAndroidX|cannot find symbol|Unresolved reference|Invalid workflow|YAML|No APK|permission_denied|Not enough memory|OOMErrorException|OutOfMemory|Kotlin daemon|Android resource linking failed|AAPT: error|resource .* not found)" durbin-build.log | head -n 160 || true
            echo ""
            echo "Last 120 log lines:"
            tail -n 120 durbin-build.log

            if grep -q "android.useAndroidX" durbin-build.log; then
              echo "::error title=AndroidX property missing::android.useAndroidX=true was missing. This workflow patches gradle.properties. If it still appears, the wrong project folder is being built."
            elif grep -qE "Android resource linking failed|AAPT: error|resource .* not found" durbin-build.log; then
              echo "::error title=Android resource error::A missing XML drawable/dimen/array/id caused resource linking to fail. V35 creates fallback resources before build."
            elif grep -q "cannot find symbol" durbin-build.log; then
              echo "::error title=Java compile error::A Java class/file is missing. See cannot find symbol lines above."
            elif grep -q "Unresolved reference" durbin-build.log; then
              echo "::error title=Kotlin compile error::A Kotlin function/import/class is missing. See unresolved reference lines above."
            elif grep -qE "Not enough memory|OOMErrorException|OutOfMemory|Kotlin daemon" durbin-build.log; then
              echo "::error title=Kotlin compiler out of memory::V33 increases Gradle and Kotlin memory. If this still appears, use a larger runner or reduce Compose dependencies."
            elif grep -q "No APK" durbin-build.log; then
              echo "::error title=APK missing::Build ran but no APK was produced. See logs above."
            else
              echo "::error title=Build failed::See DURBIN CLEAR ERROR SUMMARY above."
            fi
            exit "$STATUS"
          fi

          echo "Build successful."

      - name: Collect APK
        if: success()
        shell: bash
        run: |
          mkdir -p apk-output
          APK="$(find "$PROJECT_DIR" -type f -name '*.apk' -path '*/outputs/apk/*debug/*.apk' | head -n 1)"
          if [ -z "$APK" ]; then
            echo "::error title=No APK found::Build succeeded but no debug APK was found."
            find "$PROJECT_DIR" -type f -name '*.apk' -print
            exit 1
          fi
          cp "$APK" apk-output/DURBIN-Launcher.apk
          ls -lh apk-output/DURBIN-Launcher.apk

      - name: Upload build log
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: DURBIN-build-log
          path: durbin-build.log
          retention-days: 3

      - name: Upload APK artifact
        if: success()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: DURBIN-Launcher-APK
          path: apk-output/DURBIN-Launcher.apk
          retention-days: 1

      - name: Upload APK to GitHub Release fallback
        if: success()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK_PATH="apk-output/DURBIN-Launcher.apk"
          TAG="durbin-build-${GITHUB_RUN_NUMBER}"
          TITLE="DURBIN Launcher Build ${GITHUB_RUN_NUMBER}"
          gh release create "$TAG" "$APK_PATH" --title "$TITLE" --notes "Auto-built DURBIN Launcher APK." --latest=false || gh release upload "$TAG" "$APK_PATH" --clobber


      - name: V34 resource linking guard
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          root = Path("PojavLauncher-3_openjdk")
          if not root.exists():
              root = Path(".")

          res = root / "app_pojavlauncher/src/main/res"
          values = res / "values"
          drawable = res / "drawable"
          values.mkdir(parents=True, exist_ok=True)
          drawable.mkdir(parents=True, exist_ok=True)

          dimens = values / "dimens.xml"
          dimens.write_text("""<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <dimen name="padding_tiny">1dp</dimen>
              <dimen name="padding_small">4dp</dimen>
              <dimen name="padding_moderate">8dp</dimen>
              <dimen name="padding_medium">12dp</dimen>
              <dimen name="padding_large">16dp</dimen>
              <dimen name="padding_heavy">24dp</dimen>
              <dimen name="padding_extra_large">32dp</dimen>
              <dimen name="padding_extra_extra_large">48dp</dimen>
              <dimen name="fragment_padding_medium">16dp</dimen>
              <dimen name="profile_editor_image_padding">8dp</dimen>
          </resources>
          """.replace("          ", ""), encoding="utf-8")

          social = drawable / "ic_social_media.xml"
          discord = drawable / "ic_discord.xml"
          if discord.exists():
              social.write_text(discord.read_text(encoding="utf-8"), encoding="utf-8")
          else:
              social.write_text("""<?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp"
              android:height="24dp"
              android:viewportWidth="24"
              android:viewportHeight="24">
