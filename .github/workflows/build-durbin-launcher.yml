name: Build DURBIN Launcher

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Find launcher project folder
        shell: bash
        run: |
          echo "Repo root:"
          pwd
          echo "Root files:"
          ls -la

          if [ -f "gradlew" ]; then
            echo "PROJECT_DIR=." >> "$GITHUB_ENV"
            echo "Found project in repo root"
          elif [ -f "PojavLauncher-3_openjdk/gradlew" ]; then
            echo "PROJECT_DIR=PojavLauncher-3_openjdk" >> "$GITHUB_ENV"
            echo "Found project in PojavLauncher-3_openjdk"
          elif [ -f "HyperLauncher-3_openjdk/gradlew" ]; then
            echo "PROJECT_DIR=HyperLauncher-3_openjdk" >> "$GITHUB_ENV"
            echo "Found project in HyperLauncher-3_openjdk"
          else
            echo "ERROR: gradlew not found."
            echo "Your repo must contain the real launcher source."
            echo "Expected one of these:"
            echo "- gradlew"
            echo "- PojavLauncher-3_openjdk/gradlew"
            echo "- HyperLauncher-3_openjdk/gradlew"
            find . -maxdepth 4 -type f -name "gradlew" -print
            exit 1
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Show SHA-1 fingerprint for Firebase
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          chmod +x gradlew
          ./gradlew signingReport --no-daemon > "$GITHUB_WORKSPACE/signing-report.txt" || true

          echo "SHA-1 fingerprints:"
          grep "SHA1:" "$GITHUB_WORKSPACE/signing-report.txt" || true

      - name: Upload SHA-1 report
        uses: actions/upload-artifact@v4
        with:
          name: DURBIN-SHA1-signing-report
          path: signing-report.txt
          if-no-files-found: warn
          retention-days: 7

      - name: Build APK
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          chmod +x gradlew

          ./gradlew :app_pojavlauncher:assembleFullDebug --no-daemon --stacktrace           || ./gradlew :app_pojavlauncher:assembleDebug --no-daemon --stacktrace           || ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Collect one APK
        shell: bash
        run: |
          mkdir -p apk-output

          echo "APK files found:"
          find "$PROJECT_DIR" -type f -name "*.apk" -not -path "*/androidTest/*" -print -exec ls -lh {} \;

          APK_PATH="$(find "$PROJECT_DIR" -type f -name "*.apk" -not -path "*/androidTest/*" -size +10M | grep -E 'full|universal|debug|release|arm64' | head -n 1 || true)"

          if [ -z "$APK_PATH" ]; then
            APK_PATH="$(find "$PROJECT_DIR" -type f -name "*.apk" -not -path "*/androidTest/*" -size +10M | head -n 1 || true)"
          fi

          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No installable APK found."
            find "$PROJECT_DIR" -type d | grep -E "build|outputs|apk" || true
            exit 1
          fi

          cp "$APK_PATH" apk-output/DURBIN-Launcher.apk

          echo "Chosen APK:"
          echo "$APK_PATH"
          ls -lh apk-output/DURBIN-Launcher.apk

      - name: Sign APK if unsigned
        shell: bash
        run: |
          APK="apk-output/DURBIN-Launcher.apk"

          if unzip -l "$APK" | grep -E "META-INF/.*(RSA|DSA|EC)" >/dev/null; then
            echo "APK already signed"
            exit 0
          fi

          echo "APK is unsigned. Signing with debug key..."

          mkdir -p ~/.android

          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkeypair               -keystore ~/.android/debug.keystore               -storepass android               -alias androiddebugkey               -keypass android               -keyalg RSA               -keysize 2048               -validity 10000               -dname "CN=Android Debug,O=Android,C=US"
          fi

          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -n 1)"

          "$APKSIGNER" sign             --ks ~/.android/debug.keystore             --ks-pass pass:android             --key-pass pass:android             --out apk-output/DURBIN-Launcher-signed.apk             "$APK"

          mv apk-output/DURBIN-Launcher-signed.apk "$APK"

      - name: Verify APK
        shell: bash
        run: |
          APK="apk-output/DURBIN-Launcher.apk"
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -n 1)"
          "$APKSIGNER" verify --verbose "$APK" || true
          ls -lh "$APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DURBIN-Launcher-apk
          path: apk-output/DURBIN-Launcher.apk
          if-no-files-found: error
          retention-days: 7
