name: Build DURBIN Launcher

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1

      - name: Find project folder
        shell: bash
        run: |
          if [ -f "settings.gradle" ] || [ -f "settings.gradle.kts" ]; then
            echo "PROJECT_DIR=." >> "$GITHUB_ENV"
          elif [ -f "PojavLauncher-3_openjdk/settings.gradle" ] || [ -f "PojavLauncher-3_openjdk/settings.gradle.kts" ]; then
            echo "PROJECT_DIR=PojavLauncher-3_openjdk" >> "$GITHUB_ENV"
          elif [ -f "HyperLauncher-3_openjdk/settings.gradle" ] || [ -f "HyperLauncher-3_openjdk/settings.gradle.kts" ]; then
            echo "PROJECT_DIR=HyperLauncher-3_openjdk" >> "$GITHUB_ENV"
          else
            echo "No Gradle project found"
            exit 1
          fi

      - name: Prepare Gradle
        shell: bash
        run: |
          cd "$PROJECT_DIR"

          if [ -f "gradlew" ]; then
            chmod +x gradlew
            echo "GRADLE_CMD=./gradlew" >> "$GITHUB_ENV"
          else
            echo "GRADLE_CMD=gradle" >> "$GITHUB_ENV"
          fi

          touch gradle.properties

          grep -q "^android.useAndroidX=" gradle.properties || echo "android.useAndroidX=true" >> gradle.properties
          grep -q "^android.enableJetifier=" gradle.properties || echo "android.enableJetifier=true" >> gradle.properties
          grep -q "^org.gradle.jvmargs=" gradle.properties || echo "org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8" >> gradle.properties

      - name: Build APK
        shell: bash
        run: |
          cd "$PROJECT_DIR"

          $GRADLE_CMD :app_pojavlauncher:assembleFullDebug --no-daemon --stacktrace           || $GRADLE_CMD :app_pojavlauncher:assembleDebug --no-daemon --stacktrace           || $GRADLE_CMD assembleDebug --no-daemon --stacktrace

      - name: Collect APK
        shell: bash
        run: |
          mkdir -p apk-output

          APK_PATH="$(find "$PROJECT_DIR" -type f -name "*.apk" -not -path "*/androidTest/*" -size +10M | head -n 1)"

          if [ -z "$APK_PATH" ]; then
            echo "No APK found"
            find "$PROJECT_DIR" -type f -name "*.apk" -print
            exit 1
          fi

          cp "$APK_PATH" apk-output/DURBIN-Launcher.apk
          ls -lh apk-output/DURBIN-Launcher.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DURBIN-Launcher-apk
          path: apk-output/DURBIN-Launcher.apk
          if-no-files-found: error
