name: Build DURBIN Launcher

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Show root files
        run: |
          echo "Current folder:"
          pwd
          echo "Root files:"
          ls -la

      - name: Create PojavLauncher-3_openjdk folder from Hyper base
        run: |
          chmod +x make_full_source.sh
          bash make_full_source.sh

      - name: Verify created folder
        run: |
          echo "After creator script:"
          ls -la
          test -d PojavLauncher-3_openjdk
          echo "PojavLauncher-3_openjdk exists ✅"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make Gradle executable
        working-directory: PojavLauncher-3_openjdk
        run: |
          chmod +x gradlew
          ls -la

      - name: Build debug APK
        working-directory: PojavLauncher-3_openjdk
        run: |
          ./gradlew :app_pojavlauncher:assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DURBIN-Launcher-debug-apk
          path: PojavLauncher-3_openjdk/app_pojavlauncher/build/outputs/apk/debug/*.apk

      - name: Upload full generated source
        uses: actions/upload-artifact@v4
        with:
          name: PojavLauncher-3_openjdk-full-source
          path: PojavLauncher-3_openjdk
