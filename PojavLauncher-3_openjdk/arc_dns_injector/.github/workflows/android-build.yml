name: DURBIN Launcher APK Build

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-22.04
    env:
      CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Download LTW dependency
        run: |
          sudo apt-get update && sudo apt-get install -y wget
          mkdir -p app_pojavlauncher/libs
          wget -q -O app_pojavlauncher/libs/ltw-release.aar \
            https://github.com/PojavLauncherTeam/LTW/releases/latest/download/ltw-release.aar

      - name: Download JRE 8 runtime
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build.yml
          path: app_pojavlauncher/src/main/assets/components/jre
          workflow_conclusion: success
          repo: PojavLauncherTeam/android-openjdk-build-multiarch
          branch: buildjre8
          name: jre8-pojav

      - name: Download JRE 17 runtime
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build.yml
          path: app_pojavlauncher/src/main/assets/components/jre-new
          workflow_conclusion: success
          repo: PojavLauncherTeam/android-openjdk-build-multiarch
          branch: buildjre17-21
          name: jre17-pojav

      - name: Download JRE 21 runtime
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build.yml
          path: app_pojavlauncher/src/main/assets/components/jre-21
          workflow_conclusion: success
          repo: PojavLauncherTeam/android-openjdk-build-multiarch
          branch: buildjre17-21
          name: jre21-pojav

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11'

      - name: Build JRE helper module
        run: |
          chmod +x scripts/languagelist_updater.sh || true
          ./scripts/languagelist_updater.sh || true
          gradle :jre_lwjgl3glfw:build --no-daemon

      - name: Set up JDK 17 for Android build
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Assemble debug APK
        run: gradle :app_pojavlauncher:assembleDebug --no-daemon

      - name: Stage APK output
        run: |
          mkdir -p out
          cp app_pojavlauncher/build/outputs/apk/debug/app_pojavlauncher-debug.apk out/durbin-launcher-debug.apk
          ls -lh out/

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: durbin-launcher-debug-apk
          path: out/durbin-launcher-debug.apk
          if-no-files-found: error
