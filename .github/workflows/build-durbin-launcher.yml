name: Build DURBIN Launcher

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle 8.11.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1

      - name: Locate launcher source
        shell: bash
        run: |
          if [ -f "PojavLauncher-3_openjdk/build.gradle" ]; then
            echo "PROJECT_DIR=PojavLauncher-3_openjdk" >> "$GITHUB_ENV"
          elif [ -f "build.gradle" ]; then
            echo "PROJECT_DIR=." >> "$GITHUB_ENV"
          else
            echo "ERROR: Could not find launcher Gradle source"
            find . -maxdepth 3 -name build.gradle -print
            exit 1
          fi

      - name: Patch missing v18 UI functions
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          p = Path("PojavLauncher-3_openjdk/app_pojavlauncher/src/main/java/net/kdt/pojavlaunch/kotlin/ui/screens/MainMenuScreen.kt")
          if not p.exists():
              p = Path("app_pojavlauncher/src/main/java/net/kdt/pojavlaunch/kotlin/ui/screens/MainMenuScreen.kt")

          s = p.read_text(encoding="utf-8")

          needed_imports = [
              "import androidx.compose.ui.graphics.vector.ImageVector",
              "import net.kdt.pojavlaunch.durbin.firebase.DurbinFirebaseConfig",
              "import com.google.firebase.database.DataSnapshot",
              "import com.google.firebase.database.DatabaseError",
              "import com.google.firebase.database.FirebaseDatabase",
              "import com.google.firebase.database.ValueEventListener",
          ]

          lines = s.splitlines()
          import_positions = [i for i, line in enumerate(lines) if line.startswith("import ")]
          insert_at = import_positions[-1] + 1 if import_positions else 1
          for imp in needed_imports:
              if imp not in s:
                  lines.insert(insert_at, imp)
                  insert_at += 1
          s = "\n".join(lines) + "\n"

          inline_news = r'''
          @Composable
          private fun DurbinInlineNewsPanel() {
              val context = LocalContext.current
              var title by remember { mutableStateOf("DURBIN News") }
              var body by remember { mutableStateOf("Loading latest launcher news...") }
              var tag by remember { mutableStateOf("News") }

              LaunchedEffect(Unit) {
                  try {
            val ready = DurbinFirebaseConfig.ensureInitialized(context)
            if (!ready) {
                title = "DURBIN News"
                body = "Firebase is not ready yet. Rebuild with the included google-services.json."
                tag = "Offline"
            } else {
                FirebaseDatabase.getInstance(context.getString(R.string.durbin_firebase_database_url).trim())
                    .getReference("durbin/news")
                    .addListenerForSingleValueEvent(object : ValueEventListener {
                        override fun onDataChange(snapshot: DataSnapshot) {
                            val latest = snapshot.children.maxByOrNull {
                                it.child("timestamp").getValue(Long::class.java) ?: 0L
                            }
                            if (latest == null) {
                                title = "DURBIN News"
                                body = "No news added yet. Add your first news in Firebase."
                                tag = "Empty"
                            } else {
                                title = latest.child("title").getValue(String::class.java) ?: "DURBIN News"
                                body = latest.child("body").getValue(String::class.java) ?: "No description"
                                tag = latest.child("tag").getValue(String::class.java) ?: "News"
                            }
                        }

                        override fun onCancelled(error: DatabaseError) {
                            title = "DURBIN News"
                            body = error.message
                            tag = "Error"
                        }
                    })
            }
                  } catch (t: Throwable) {
            title = "DURBIN News"
            body = t.message ?: "Could not load news"
            tag = "Offline"
                  }
              }

              Surface(
                  modifier = Modifier
            .fillMaxWidth()
            .height(82.dp),
                  shape = RoundedCornerShape(18.dp),
                  color = Color.Black.copy(alpha = 0.55f),
                  border = BorderStroke(1.dp, Color.White.copy(alpha = 0.18f))
              ) {
                  Row(
            modifier = Modifier.padding(horizontal = 13.dp, vertical = 10.dp),
            verticalAlignment = Alignment.CenterVertically,
            horizontalArrangement = Arrangement.spacedBy(11.dp)
                  ) {
            Box(
                modifier = Modifier
                    .size(46.dp)
                    .clip(RoundedCornerShape(14.dp))
                    .background(MaterialTheme.colorScheme.primary.copy(alpha = 0.20f)),
                contentAlignment = Alignment.Center
            ) {
                Icon(Icons.Rounded.Article, contentDescription = null, tint = MaterialTheme.colorScheme.primary, modifier = Modifier.size(25.dp))
            }
            Column(modifier = Modifier.weight(1f), verticalArrangement = Arrangement.Center) {
                Text(
                    text = tag.uppercase(),
                    color = MaterialTheme.colorScheme.primary,
                    fontSize = 9.sp,
                    fontWeight = FontWeight.Black,
                    maxLines = 1
                )
                Text(
                    text = title,
                    color = Color.White,
                    fontSize = 16.sp,
                    fontWeight = FontWeight.Black,
                    maxLines = 1,
                    overflow = TextOverflow.Ellipsis
                )
                Text(
                    text = body.ifBlank { "No description" },
                    color = Color.White.copy(alpha = 0.76f),
                    fontSize = 11.sp,
                    maxLines = 1,
                    overflow = TextOverflow.Ellipsis
                )
            }
                  }
              }
          }
          '''

          action_card = r'''
          @Composable
          private fun DurbinActionCard(
              modifier: Modifier = Modifier,
              title: String,
              icon: ImageVector,
              subtitle: String,
              onClick: () -> Unit,
              accent: Boolean = false
          ) {
              val borderColor = if (accent) MaterialTheme.colorScheme.primary.copy(alpha = 0.48f) else MaterialTheme.colorScheme.outline.copy(alpha = 0.24f)
              val iconBoxColor = if (accent) MaterialTheme.colorScheme.primary.copy(alpha = 0.24f) else Color.White.copy(alpha = 0.08f)

              OutlinedButton(
                  onClick = onClick,
                  modifier = modifier,
                  shape = RoundedCornerShape(18.dp),
                  border = BorderStroke(1.dp, borderColor),
                  colors = ButtonDefaults.outlinedButtonColors(
            containerColor = Color.Transparent,
            contentColor = Color.White
                  ),
                  contentPadding = PaddingValues(horizontal = 14.dp)
              ) {
                  Row(
            modifier = Modifier.fillMaxSize(),
            verticalAlignment = Alignment.CenterVertically,
            horizontalArrangement = Arrangement.spacedBy(12.dp)
                  ) {
            Box(
                modifier = Modifier
                    .size(42.dp)
                    .clip(RoundedCornerShape(13.dp))
                    .background(iconBoxColor),
                contentAlignment = Alignment.Center
            ) {
                Icon(icon, contentDescription = null, modifier = Modifier.size(23.dp), tint = if (accent) MaterialTheme.colorScheme.primary else Color.White)
            }
            Column(modifier = Modifier.weight(1f), verticalArrangement = Arrangement.Center) {
                Text(title, color = Color.White, fontWeight = FontWeight.ExtraBold, fontSize = 15.sp, maxLines = 1, overflow = TextOverflow.Ellipsis)
                Text(subtitle, color = Color(0xFFBDBDBD), fontSize = 11.sp, maxLines = 1, overflow = TextOverflow.Ellipsis)
            }
            Icon(Icons.AutoMirrored.Filled.ArrowForward, contentDescription = null, modifier = Modifier.size(16.dp), tint = if (accent) MaterialTheme.colorScheme.primary else Color.White.copy(alpha = 0.55f))
                  }
              }
          }
          '''

          extra = ""
          if "private fun DurbinInlineNewsPanel" not in s:
              extra += "\n" + inline_news.strip() + "\n"
          if "private fun DurbinActionCard" not in s:
              extra += "\n" + action_card.strip() + "\n"

          if extra:
              marker = "\n@Composable\nprivate fun DurbinStatusChip"
              if marker in s:
                  s = s.replace(marker, "\n" + extra + marker, 1)
              else:
                  s += "\n" + extra

          p.write_text(s, encoding="utf-8")
          print("Patched:", p)
          print("DurbinInlineNewsPanel exists:", "private fun DurbinInlineNewsPanel" in s)
          print("DurbinActionCard exists:", "private fun DurbinActionCard" in s)
          PY

      - name: Remove Google login and Firebase Auth dependency
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import base64

          root = Path("PojavLauncher-3_openjdk")
          if not root.exists():
              root = Path(".")

          build = root / "app_pojavlauncher" / "build.gradle"
          if build.exists():
              s = build.read_text(encoding="utf-8")
              s = "\n".join(
                  line for line in s.splitlines()
                  if "firebase-auth" not in line
                  and "play-services-auth" not in line
              ) + "\n"
              build.write_text(s, encoding="utf-8")
              print("Removed Firebase Auth and Google Sign-In dependencies")
          else:
              print("WARN: build.gradle not found")

          hub = root / "app_pojavlauncher" / "src" / "main" / "java" / "net" / "kdt" / "pojavlaunch" / "durbin" / "firebase" / "DurbinFirebaseHubActivity.kt"
          hub.parent.mkdir(parents=True, exist_ok=True)
          data = base64.b64decode("").decode("utf-8")
          hub.write_text(data, encoding="utf-8")
          print("Replaced DurbinFirebaseHubActivity.kt with no-login version")
          PY


      - name: Remove duplicate Firebase model classes
        shell: bash
        run: |
          ROOT="PojavLauncher-3_openjdk"
          if [ ! -d "$ROOT" ]; then
            ROOT="."
          fi

          MODEL_FILE="$ROOT/app_pojavlauncher/src/main/java/net/kdt/pojavlaunch/durbin/firebase/DurbinFirebaseModels.kt"

          if [ -f "$MODEL_FILE" ]; then
            echo "Removing duplicate Firebase model file: $MODEL_FILE"
            rm -f "$MODEL_FILE"
          else
            echo "No duplicate Firebase model file found."
          fi

          echo "Checking remaining Firebase model declarations:"
          grep -RIn "data class DurbinNewsItem\|data class DurbinTierCategory\|data class DurbinTierEntry" \
            "$ROOT/app_pojavlauncher/src/main/java/net/kdt/pojavlaunch/durbin/firebase" || true


      - name: Patch media news, tier tabs, sidebar and ad image
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import base64
          import re

          root = Path("PojavLauncher-3_openjdk")
          if not root.exists():
              root = Path(".")

          main = root / "app_pojavlauncher" / "src" / "main" / "java" / "net" / "kdt" / "pojavlaunch" / "kotlin" / "ui" / "screens" / "MainMenuScreen.kt"
          hub = root / "app_pojavlauncher" / "src" / "main" / "java" / "net" / "kdt" / "pojavlaunch" / "durbin" / "firebase" / "DurbinFirebaseHubActivity.kt"

          hub.write_text(base64.b64decode("").decode("utf-8"), encoding="utf-8")
          print("Updated Firebase hub with news images and tier grid")

          s = main.read_text(encoding="utf-8")

          def add_import(src, imp):
              if imp in src:
                  return src
              lines = src.splitlines()
              pos = max([i for i, line in enumerate(lines) if line.startswith("import ")] or [0]) + 1
              lines.insert(pos, imp)
              return "\n".join(lines) + "\n"

          for imp in [
              "import android.graphics.BitmapFactory",
              "import kotlinx.coroutines.Dispatchers",
              "import kotlinx.coroutines.withContext",
              "import java.net.URL",
          ]:
              s = add_import(s, imp)

          def replace_between(src, start, end, replacement):
              if start not in src or end not in src:
                  return src
              a = src.index(start)
              b = src.index(end, a)
              return src[:a] + replacement.rstrip() + "\n\n" + src[b:]

          remote_func = r"""
          @Composable
          private fun DurbinRemoteImage(
              url: String,
              modifier: Modifier,
              fallbackRes: Int? = null
          ) {
              var bitmap by remember(url) { mutableStateOf<Bitmap?>(null) }

              LaunchedEffect(url) {
                  if (url.isNotBlank()) {
                      bitmap = withContext(Dispatchers.IO) {
                          runCatching {
                              URL(url).openStream().use { stream ->
                                  BitmapFactory.decodeStream(stream)
                              }
                          }.getOrNull()
                      }
                  }
              }

              if (bitmap != null) {
                  Image(
                      bitmap = bitmap!!.asImageBitmap(),
                      contentDescription = null,
                      modifier = modifier,
                      contentScale = ContentScale.Crop
                  )
              } else if (fallbackRes != null) {
                  Image(
                      painter = painterResource(id = fallbackRes),
                      contentDescription = null,
                      modifier = modifier,
                      contentScale = ContentScale.Crop
                  )
              } else {
                  Box(
                      modifier = modifier.background(
                          Brush.radialGradient(
                              colors = listOf(MaterialTheme.colorScheme.primary.copy(alpha = 0.22f), Color(0xFF111111))
                          )
                      )
                  )
              }
          }
          """

          if "private fun DurbinRemoteImage" not in s:
              marker = "\n@Composable\nprivate fun DurbinSideRail"
              if marker in s:
                  s = s.replace(marker, "\n" + remote_func.strip() + "\n" + marker, 1)
              else:
                  s += "\n" + remote_func.strip() + "\n"

          side_rail = r"""
          @Composable
          private fun DurbinSideRail(
              modifier: Modifier,
              currentAccount: MinecraftAccount?,
              skinHead: Bitmap?,
              onYoutubeClick: () -> Unit,
              onSocialMediaClick: () -> Unit,
              onOpenFilesClick: () -> Unit,
              onCustomControlsClick: () -> Unit
          ) {
              DurbinGlassSurface(
                  modifier = modifier.width(54.dp).fillMaxHeight(),
                  corner = 18,
                  borderAlpha = 0.14f
              ) {
                  Column(
                      modifier = Modifier.fillMaxSize().padding(vertical = 12.dp),
                      horizontalAlignment = Alignment.CenterHorizontally,
                      verticalArrangement = Arrangement.spacedBy(12.dp)
                  ) {
                      DurbinRailButton(Icons.Rounded.Dashboard, "Home") {}
                      DurbinRailButton(Icons.Rounded.SportsEsports, "Controls", onCustomControlsClick)
                      DurbinRailButton(Icons.Rounded.Article, "News", onYoutubeClick)
                      DurbinRailButton(Icons.Rounded.EmojiEvents, "PvP", onSocialMediaClick)
                      DurbinRailButton(Icons.Rounded.Folder, "Files", onOpenFilesClick)
                      Spacer(Modifier.weight(1f))
                      DurbinRailButton(Icons.Rounded.Settings, "Settings", onCustomControlsClick)
                  }
              }
          }
          """
          s = replace_between(s, "@Composable\nprivate fun DurbinSideRail", "@Composable\nprivate fun DurbinRailButton", side_rail)

          rail_button = r"""
          @Composable
          private fun DurbinRailButton(icon: ImageVector, label: String, onClick: () -> Unit) {
              IconButton(
                  onClick = onClick,
                  modifier = Modifier
                      .size(42.dp)
                      .clip(RoundedCornerShape(14.dp))
                      .background(Color.White.copy(alpha = 0.045f))
                      .border(BorderStroke(1.dp, Color.White.copy(alpha = 0.12f)), RoundedCornerShape(14.dp))
              ) {
                  Icon(icon, contentDescription = label, tint = Color.White.copy(alpha = 0.92f), modifier = Modifier.size(22.dp))
              }
          }
          """
          s = replace_between(s, "@Composable\nprivate fun DurbinRailButton", "@Composable\nprivate fun DurbinHeroLaunchBanner", rail_button)

          latest_news = r"""
          @Composable
          private fun DurbinLatestNewsGrid() {
              Column(verticalArrangement = Arrangement.spacedBy(9.dp)) {
                  Text("LATEST NEWS", color = Color.White, fontWeight = FontWeight.Black, fontSize = 21.sp)
                  DurbinInlineNewsPanel()
              }
          }
          """
          s = replace_between(s, "@Composable\nprivate fun DurbinLatestNewsGrid", "@Composable\nprivate fun DurbinNewsTile", latest_news)

          inline_news = r"""
          @Composable
          private fun DurbinInlineNewsPanel() {
              val context = LocalContext.current
              var title by remember { mutableStateOf("DURBIN News") }
              var body by remember { mutableStateOf("Loading latest launcher news...") }
              var tag by remember { mutableStateOf("News") }
              var imageUrl by remember { mutableStateOf("") }

              LaunchedEffect(Unit) {
                  try {
                      val ready = DurbinFirebaseConfig.ensureInitialized(context)
                      if (!ready) {
                          title = "DURBIN News"
                          body = "Firebase config is not ready."
                          tag = "Offline"
                          imageUrl = ""
                      } else {
                          FirebaseDatabase.getInstance(context.getString(R.string.durbin_firebase_database_url).trim())
                              .getReference("durbin/news")
                              .addListenerForSingleValueEvent(object : ValueEventListener {
                                  override fun onDataChange(snapshot: DataSnapshot) {
                                      val latest = snapshot.children.maxWithOrNull(
                                          compareBy<DataSnapshot> {
                                              if (it.child("pinned").getValue(Boolean::class.java) == true) 1 else 0
                                          }.thenBy {
                                              it.child("timestamp").getValue(Long::class.java) ?: 0L
                                          }
                                      )
                                      if (latest == null) {
                                          title = "DURBIN News"
                                          body = "No news added yet."
                                          tag = "Empty"
                                          imageUrl = ""
                                      } else {
                                          title = latest.child("title").getValue(String::class.java) ?: "DURBIN News"
                                          body = latest.child("body").getValue(String::class.java) ?: "No description"
                                          tag = latest.child("tag").getValue(String::class.java) ?: "News"
                                          imageUrl = latest.child("imageUrl").getValue(String::class.java).orEmpty()
                                      }
                                  }

                                  override fun onCancelled(error: DatabaseError) {
                                      title = "DURBIN News"
                                      body = error.message
                                      tag = "Error"
                                      imageUrl = ""
                                  }
                              })
                      }
                  } catch (t: Throwable) {
                      title = "DURBIN News"
                      body = t.message ?: "Could not load news"
                      tag = "Offline"
                      imageUrl = ""
                  }
              }

              Surface(
                  modifier = Modifier.fillMaxWidth().height(112.dp),
                  shape = RoundedCornerShape(18.dp),
                  color = Color.Black.copy(alpha = 0.55f),
                  border = BorderStroke(1.dp, Color.White.copy(alpha = 0.18f))
              ) {
                  Row(
                      modifier = Modifier.padding(12.dp),
                      verticalAlignment = Alignment.CenterVertically,
                      horizontalArrangement = Arrangement.spacedBy(12.dp)
                  ) {
                      if (imageUrl.isNotBlank()) {
                          DurbinRemoteImage(
                              url = imageUrl,
                              modifier = Modifier.size(width = 140.dp, height = 88.dp).clip(RoundedCornerShape(14.dp))
                          )
                      } else {
                          Box(
                              modifier = Modifier.size(54.dp).clip(RoundedCornerShape(14.dp)).background(MaterialTheme.colorScheme.primary.copy(alpha = 0.20f)),
                              contentAlignment = Alignment.Center
                          ) {
                              Icon(Icons.Rounded.Article, contentDescription = null, tint = MaterialTheme.colorScheme.primary, modifier = Modifier.size(28.dp))
                          }
                      }

                      Column(modifier = Modifier.weight(1f), verticalArrangement = Arrangement.Center) {
                          Text(tag.uppercase(), color = MaterialTheme.colorScheme.primary, fontSize = 9.sp, fontWeight = FontWeight.Black, maxLines = 1)
                          Text(title, color = Color.White, fontSize = 17.sp, fontWeight = FontWeight.Black, maxLines = 1, overflow = TextOverflow.Ellipsis)
                          Text(body.ifBlank { "No description" }, color = Color.White.copy(alpha = 0.76f), fontSize = 11.sp, maxLines = 2, overflow = TextOverflow.Ellipsis)
                      }
                  }
              }
          }
          """
          s = replace_between(s, "@Composable\nprivate fun DurbinInlineNewsPanel", "@Composable\nprivate fun DurbinActionCard", inline_news)

          ad_panel = r"""
          @Composable
          private fun DurbinAdPanel(
              modifier: Modifier
          ) {
              val context = LocalContext.current
              var adUrl by remember { mutableStateOf("") }

              LaunchedEffect(Unit) {
                  runCatching {
                      if (DurbinFirebaseConfig.ensureInitialized(context)) {
                          FirebaseDatabase.getInstance(context.getString(R.string.durbin_firebase_database_url).trim())
                              .getReference("durbin/ads/main/imageUrl")
                              .addListenerForSingleValueEvent(object : ValueEventListener {
                                  override fun onDataChange(snapshot: DataSnapshot) {
                                      adUrl = snapshot.getValue(String::class.java).orEmpty()
                                  }

                                  override fun onCancelled(error: DatabaseError) {
                                      adUrl = ""
                                  }
                              })
                      }
                  }
              }

              Box(
                  modifier = modifier,
                  contentAlignment = Alignment.TopCenter
              ) {
                  Box(
                      modifier = Modifier
                          .fillMaxWidth()
                          .aspectRatio(9f / 16f)
                          .clip(RoundedCornerShape(22.dp))
                          .border(BorderStroke(1.dp, Color.White.copy(alpha = 0.18f)), RoundedCornerShape(22.dp))
                  ) {
                      DurbinRemoteImage(
                          url = adUrl,
                          fallbackRes = R.drawable.durbin_ad_9_16,
                          modifier = Modifier.fillMaxSize()
                      )
                  }
              }
          }
          """
          s = replace_between(s, "@Composable\nprivate fun DurbinAdPanel", "@Composable\nprivate fun DurbinStatusChip", ad_panel)

          main.write_text(s, encoding="utf-8")
          print("Patched main menu media/ad/sidebar/news UI")
          PY

      - name: Final source sanity check
        shell: bash
        run: |
          echo "Checking for real merge conflict markers only..."
          if grep -RInI -E '^(<<<<<<<|=======|>>>>>>>)( |$)' \
            --exclude-dir=.git \
            --exclude-dir=.gradle \
            --exclude-dir=build \
            --exclude-dir=.cxx \
            --exclude='*.so' \
            --exclude='*.jar' \
            --exclude='*.png' \
            --exclude='*.webp' \
            --exclude='*.jpg' \
            --exclude='*.jpeg' \
            --exclude='*.zip' \
            . ; then
            echo "ERROR: real merge conflict markers found"
            exit 1
          fi

      - name: Verify package and SHA1
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          echo "Package check: net.ashmeet.hyperlauncher"
          grep -n 'applicationId "net.ashmeet.hyperlauncher"' app_pojavlauncher/build.gradle || true
          grep -n '"package_name": "net.ashmeet.hyperlauncher"' app_pojavlauncher/google-services.json || true
          keytool -list -v -keystore app_pojavlauncher/debug.keystore -storepass android | grep -E "SHA1|SHA256" || true


      - name: Final MainMenu compile guard
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          root = Path("PojavLauncher-3_openjdk")
          if not root.exists():
              root = Path(".")

          p = root / "app_pojavlauncher/src/main/java/net/kdt/pojavlaunch/kotlin/ui/screens/MainMenuScreen.kt"
          if not p.exists():
              raise SystemExit(f"MainMenuScreen.kt not found: {p}")

          s = p.read_text(encoding="utf-8")

          def add_import(src: str, imp: str) -> str:
              if imp in src:
                  return src
              lines = src.splitlines()
              positions = [i for i, line in enumerate(lines) if line.startswith("import ")]
              insert_at = positions[-1] + 1 if positions else 1
              lines.insert(insert_at, imp)
              return "\n".join(lines) + "\n"

          needed_imports = [
              "import android.graphics.BitmapFactory",
              "import androidx.compose.material.icons.automirrored.filled.ArrowForward",
              "import androidx.compose.ui.graphics.vector.ImageVector",
              "import kotlinx.coroutines.Dispatchers",
              "import kotlinx.coroutines.withContext",
              "import java.net.URL",
              "import net.kdt.pojavlaunch.durbin.firebase.DurbinFirebaseConfig",
              "import com.google.firebase.database.DataSnapshot",
              "import com.google.firebase.database.DatabaseError",
              "import com.google.firebase.database.FirebaseDatabase",
              "import com.google.firebase.database.ValueEventListener",
          ]

          for imp in needed_imports:
              s = add_import(s, imp)

          remote_image = '''
          @Composable
          private fun DurbinRemoteImage(
              url: String,
              modifier: Modifier,
              fallbackRes: Int? = null
          ) {
              var bitmap by remember(url) { mutableStateOf<Bitmap?>(null) }

              LaunchedEffect(url) {
                  if (url.isNotBlank()) {
                      bitmap = withContext(Dispatchers.IO) {
                          runCatching {
                              URL(url).openStream().use { stream ->
                                  BitmapFactory.decodeStream(stream)
                              }
                          }.getOrNull()
                      }
                  }
              }

              if (bitmap != null) {
                  Image(
                      bitmap = bitmap!!.asImageBitmap(),
                      contentDescription = null,
                      modifier = modifier,
                      contentScale = ContentScale.Crop
                  )
              } else if (fallbackRes != null) {
                  Image(
                      painter = painterResource(id = fallbackRes),
                      contentDescription = null,
                      modifier = modifier,
                      contentScale = ContentScale.Crop
                  )
              } else {
                  Box(
                      modifier = modifier.background(
                          Brush.radialGradient(
                              colors = listOf(MaterialTheme.colorScheme.primary.copy(alpha = 0.22f), Color(0xFF111111))
                          )
                      )
                  )
              }
          }
          '''

          inline_news = '''
          @Composable
          private fun DurbinInlineNewsPanel() {
              val context = LocalContext.current
              var title by remember { mutableStateOf("DURBIN News") }
              var body by remember { mutableStateOf("Loading latest launcher news...") }
              var tag by remember { mutableStateOf("News") }
              var imageUrl by remember { mutableStateOf("") }

              LaunchedEffect(Unit) {
                  try {
                      val ready = DurbinFirebaseConfig.ensureInitialized(context)
                      if (!ready) {
                          title = "DURBIN News"
                          body = "Firebase config is not ready."
                          tag = "Offline"
                          imageUrl = ""
                      } else {
                          FirebaseDatabase.getInstance(context.getString(R.string.durbin_firebase_database_url).trim())
                              .getReference("durbin/news")
                              .addListenerForSingleValueEvent(object : ValueEventListener {
                                  override fun onDataChange(snapshot: DataSnapshot) {
                                      val latest = snapshot.children.maxWithOrNull(
                                          compareBy<DataSnapshot> {
                                              if (it.child("pinned").getValue(Boolean::class.java) == true) 1 else 0
                                          }.thenBy {
                                              it.child("timestamp").getValue(Long::class.java) ?: 0L
                                          }
                                      )
                                      if (latest == null) {
                                          title = "DURBIN News"
                                          body = "No news added yet."
                                          tag = "Empty"
                                          imageUrl = ""
                                      } else {
                                          title = latest.child("title").getValue(String::class.java) ?: "DURBIN News"
                                          body = latest.child("body").getValue(String::class.java) ?: "No description"
                                          tag = latest.child("tag").getValue(String::class.java) ?: "News"
                                          imageUrl = latest.child("imageUrl").getValue(String::class.java).orEmpty()
                                      }
                                  }

                                  override fun onCancelled(error: DatabaseError) {
                                      title = "DURBIN News"
                                      body = error.message
                                      tag = "Error"
                                      imageUrl = ""
                                  }
                              })
                      }
                  } catch (t: Throwable) {
                      title = "DURBIN News"
                      body = t.message ?: "Could not load news"
                      tag = "Offline"
                      imageUrl = ""
                  }
              }

              Surface(
                  modifier = Modifier.fillMaxWidth().height(112.dp),
                  shape = RoundedCornerShape(18.dp),
                  color = Color.Black.copy(alpha = 0.55f),
                  border = BorderStroke(1.dp, Color.White.copy(alpha = 0.18f))
              ) {
                  Row(
                      modifier = Modifier.padding(12.dp),
                      verticalAlignment = Alignment.CenterVertically,
                      horizontalArrangement = Arrangement.spacedBy(12.dp)
                  ) {
                      if (imageUrl.isNotBlank()) {
                          DurbinRemoteImage(
                              url = imageUrl,
                              modifier = Modifier.size(width = 140.dp, height = 88.dp).clip(RoundedCornerShape(14.dp))
                          )
                      } else {
                          Box(
                              modifier = Modifier.size(54.dp).clip(RoundedCornerShape(14.dp)).background(MaterialTheme.colorScheme.primary.copy(alpha = 0.20f)),
                              contentAlignment = Alignment.Center
                          ) {
                              Icon(Icons.Rounded.Article, contentDescription = null, tint = MaterialTheme.colorScheme.primary, modifier = Modifier.size(28.dp))
                          }
                      }

                      Column(modifier = Modifier.weight(1f), verticalArrangement = Arrangement.Center) {
                          Text(tag.uppercase(), color = MaterialTheme.colorScheme.primary, fontSize = 9.sp, fontWeight = FontWeight.Black, maxLines = 1)
                          Text(title, color = Color.White, fontSize = 17.sp, fontWeight = FontWeight.Black, maxLines = 1, overflow = TextOverflow.Ellipsis)
                          Text(body.ifBlank { "No description" }, color = Color.White.copy(alpha = 0.76f), fontSize = 11.sp, maxLines = 2, overflow = TextOverflow.Ellipsis)
                      }
                  }
              }
          }
          '''

          action_card = '''
          @Composable
          private fun DurbinActionCard(
              modifier: Modifier = Modifier,
              title: String,
              icon: ImageVector,
              subtitle: String,
              onClick: () -> Unit,
              accent: Boolean = false
          ) {
              val borderColor = if (accent) MaterialTheme.colorScheme.primary.copy(alpha = 0.48f) else MaterialTheme.colorScheme.outline.copy(alpha = 0.24f)
              val iconBoxColor = if (accent) MaterialTheme.colorScheme.primary.copy(alpha = 0.24f) else Color.White.copy(alpha = 0.08f)

              OutlinedButton(
                  onClick = onClick,
                  modifier = modifier,
                  shape = RoundedCornerShape(18.dp),
                  border = BorderStroke(1.dp, borderColor),
                  colors = ButtonDefaults.outlinedButtonColors(
                      containerColor = Color.Transparent,
                      contentColor = Color.White
                  ),
                  contentPadding = PaddingValues(horizontal = 14.dp)
              ) {
                  Row(
                      modifier = Modifier.fillMaxSize(),
                      verticalAlignment = Alignment.CenterVertically,
                      horizontalArrangement = Arrangement.spacedBy(12.dp)
                  ) {
                      Box(
                          modifier = Modifier
                              .size(42.dp)
                              .clip(RoundedCornerShape(13.dp))
                              .background(iconBoxColor),
                          contentAlignment = Alignment.Center
                      ) {
                          Icon(icon, contentDescription = null, modifier = Modifier.size(23.dp), tint = if (accent) MaterialTheme.colorScheme.primary else Color.White)
                      }

                      Column(modifier = Modifier.weight(1f), verticalArrangement = Arrangement.Center) {
                          Text(title, color = Color.White, fontWeight = FontWeight.ExtraBold, fontSize = 15.sp, maxLines = 1, overflow = TextOverflow.Ellipsis)
                          Text(subtitle, color = Color(0xFFBDBDBD), fontSize = 11.sp, maxLines = 1, overflow = TextOverflow.Ellipsis)
                      }

                      Icon(Icons.AutoMirrored.Filled.ArrowForward, contentDescription = null, modifier = Modifier.size(16.dp), tint = if (accent) MaterialTheme.colorScheme.primary else Color.White.copy(alpha = 0.55f))
                  }
              }
          }
          '''

          extra = ""
          if "private fun DurbinRemoteImage" not in s:
              extra += "\n" + remote_image.strip() + "\n"
          if "private fun DurbinInlineNewsPanel" not in s:
              extra += "\n" + inline_news.strip() + "\n"
          if "private fun DurbinActionCard" not in s:
              extra += "\n" + action_card.strip() + "\n"

          if extra:
              marker = "\n@Composable\nprivate fun DurbinStatusChip"
              if marker in s:
                  s = s.replace(marker, "\n" + extra + marker, 1)
              else:
                  s += "\n" + extra

          p.write_text(s, encoding="utf-8")
          print("Final MainMenu guard done")
          print("DurbinInlineNewsPanel exists:", "private fun DurbinInlineNewsPanel" in s)
          print("DurbinActionCard exists:", "private fun DurbinActionCard" in s)
          PY

      - name: Build APK
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          gradle :app_pojavlauncher:assembleFullDebug --no-daemon --stacktrace

      - name: Collect APK
        shell: bash
        run: |
          mkdir -p apk-output
          APK_PATH="$(find "$PROJECT_DIR" -type f -name '*.apk' -not -path '*/androidTest/*' -size +10M | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "No APK found"
            find "$PROJECT_DIR" -type f -name '*.apk' -print
            exit 1
          fi
          cp "$APK_PATH" apk-output/DURBIN-Launcher.apk
          ls -lh apk-output/DURBIN-Launcher.apk

      - name: Upload APK
        id: upload_apk_artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: DURBIN-Launcher-APK
          path: apk-output/DURBIN-Launcher.apk
          retention-days: 1

      - name: Upload APK to GitHub Release fallback
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK_PATH="apk-output/DURBIN-Launcher.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "APK not found at $APK_PATH"
            find . -name "*.apk" -type f
            exit 1
          fi
          TAG="durbin-build-${GITHUB_RUN_NUMBER}"
          TITLE="DURBIN Launcher Build ${GITHUB_RUN_NUMBER}"
          gh release create "$TAG" "$APK_PATH" --title "$TITLE" --notes "Auto-built DURBIN Launcher APK." --latest=false || gh release upload "$TAG" "$APK_PATH" --clobber
