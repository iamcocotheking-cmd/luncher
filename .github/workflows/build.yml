name: DURBIN Launcher APK Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: PojavLauncher-3_openjdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Verify nested Android project structure
        run: |
          echo "Current folder:"
          pwd
          echo "Files:"
          ls -la
          test -f settings.gradle || (echo "settings.gradle not found. Make sure PojavLauncher-3_openjdk is in repo root." && exit 1)
          test -f gradlew || (echo "gradlew not found. Make sure PojavLauncher-3_openjdk is in repo root." && exit 1)
          test -d app_pojavlauncher || (echo "app_pojavlauncher folder not found." && exit 1)

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew --no-daemon :app_pojavlauncher:assembleDebug --stacktrace

      - name: Copy APK to clean output folder
        run: |
          mkdir -p build/apk-output
          cp app_pojavlauncher/build/outputs/apk/debug/*.apk build/apk-output/durbin-launcher-debug.apk
          ls -la build/apk-output

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: durbin-launcher-debug-apk
          path: PojavLauncher-3_openjdk/build/apk-output/durbin-launcher-debug.apk
          if-no-files-found: error
